<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat - Buy License</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0a0c1f; color: #c9d1d9; margin:0; padding:40px 20px; min-height:100vh; position:relative; overflow-y:auto; }
    #mesh-bg { position:fixed; top:0; left:0; right:0; bottom:0; z-index:-1; opacity:0.95; }
    .container { max-width:820px; margin:0 auto; text-align:center; position:relative; z-index:2; }
    h1 { font-size:3.4em; background:linear-gradient(90deg,#a855f7,#67e8f9); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
    .wallet-info { background:#1e2937; padding:12px; border-radius:8px; margin:15px 0; font-family:monospace; }
    .device-box { background:rgba(15,23,42,0.95); padding:25px; border-radius:16px; margin:30px auto; max-width:620px; text-align:center; }
    button { padding:16px 36px; font-size:1.15em; font-weight:600; border:none; border-radius:14px; cursor:pointer; margin:8px; transition:all 0.3s; position:relative; }
    .btn-primary { background:linear-gradient(135deg,#a855f7,#3b82f6); color:white; box-shadow:0 8px 25px rgba(168,85,247,0.5); }
    .btn-primary:hover { transform:translateY(-4px); }
    .selected { box-shadow:0 0 0 4px #22c55e !important; }
    .selected::after { content:" ✅"; }
    .success { background:#052e16; border:2px solid #22c55e; padding:20px; border-radius:12px; margin:25px auto; }
  </style>
</head>
<body>
  <canvas id="mesh-bg"></canvas>
  
  <div class="container">
    <h1>Buy License</h1>
    <p style="font-size:1.4em;color:#94a3b8;">Unlock Full Features + Rewards</p>

    <!-- Connect Wallet -->
    <button onclick="connectWallet()" class="btn-primary" style="margin-bottom:20px;">🔗 Connect Wallet (MetaMask / Ledger)</button>
    <div id="walletInfo" class="wallet-info">Wallet not connected</div>

    <!-- Detect Device -->
    <button onclick="detectDevice()" class="btn-primary">🔍 Detect Connected Heltec Device</button>

    <div id="deviceBox" class="device-box" style="display:none;">
      <strong>Detected Device</strong><br><br>
      <div id="deviceDetails" style="font-size:1.1em;"></div>
      <button onclick="useDetectedDevice()" class="btn-primary" style="margin-top:15px;">✅ Use This Device</button>
    </div>

    <!-- License Types -->
    <div style="margin:40px 0;">
      <button onclick="selectType('lifetime')" id="btnLifetime" class="btn-primary">Lifetime — 100 PLSC</button>
      <button onclick="selectType('yearly')" id="btnYearly" class="btn-primary">Yearly — 20 PLSC</button>
    </div>

    <input type="text" id="macInput" placeholder="MAC Address" style="width:85%;padding:14px;margin:15px 0;background:#1e2937;border:1px solid #475569;border-radius:8px;color:white;font-family:monospace;text-align:center;" readonly>

    <button id="payBtn" class="btn-primary" onclick="buyLicense()" style="font-size:1.35em;padding:20px 50px;">💎 Pay & Activate Now</button>

    <div id="result" style="display:none;"></div>
  </div>

  <script>
    const CONTRACT_ADDRESS = "0x4C86C5640ADEc6daDB88b75adEFE3C2FbC2d3510";
    let provider, signer, contract, selectedType = 'lifetime', selectedMac = '', licenseKey = '';

    const ABI = [
      "function buyLicense(string calldata deviceHardwareId) external",
      "function usedLicenseIds(string) view returns (bool)",
      "event LicenseIssued(address indexed user, string deviceId, string licenseKey)"
    ];

    async function connectWallet() {
      try {
        if (!window.ethereum) throw new Error("MetaMask or Ledger not detected");
        provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();
        contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
        const addr = await signer.getAddress();
        document.getElementById("walletInfo").innerHTML = `✅ Connected: <strong>${addr}</strong>`;
      } catch(e) {
        alert("Wallet connection failed: " + e.message + "\n\nMake sure MetaMask is open and Ledger is unlocked.");
      }
    }

    async function detectDevice() { /* same as before */ 
      // (I'll keep it short here - copy from previous version if needed)
      try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        const reader = port.readable.getReader();
        let buffer = '';
        const timeout = setTimeout(() => reader.cancel(), 10000);

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += new TextDecoder().decode(value);
          if (buffer.includes('=== END_STATUS ===')) {
            clearTimeout(timeout); reader.cancel();
            const macMatch = buffer.match(/MAC:([0-9A-F:]+)/i);
            selectedMac = macMatch ? macMatch[1] : 'Unknown';
            const licensed = buffer.includes('LICENSED:YES') ? '✅ Licensed' : '❌ Not Licensed';

            document.getElementById("deviceDetails").innerHTML = `MAC: <strong>${selectedMac}</strong><br>Status: ${licensed}`;
            document.getElementById("deviceBox").style.display = 'block';
            document.getElementById("macInput").value = selectedMac;
            break;
          }
        }
      } catch(e) { alert("Device detection failed. Is your Heltec plugged in?"); }
    }

    function useDetectedDevice() {
      document.getElementById("macInput").value = selectedMac;
    }

    function selectType(type) {
      selectedType = type;
      document.getElementById("btnLifetime").classList.toggle('selected', type === 'lifetime');
      document.getElementById("btnYearly").classList.toggle('selected', type === 'yearly');
    }

    async function buyLicense() {
      const mac = document.getElementById("macInput").value.trim();
      if (!mac) return alert("Please detect a device first");

      try {
        const alreadyLicensed = await contract.usedLicenseIds(mac);
        if (alreadyLicensed) return alert("❌ This device is already licensed!");
      } catch(e) {}

      const payBtn = document.getElementById("payBtn");
      payBtn.innerHTML = "⏳ Sending Transaction...";
      payBtn.disabled = true;

      try {
        const tx = await contract.buyLicense(mac);
        const receipt = await tx.wait();
        const event = receipt.logs.find(l => l.topics[0] === ethers.id("LicenseIssued(address,string,string)"));
        licenseKey = event ? ethers.AbiCoder.defaultAbiCoder().decode(["address","string","string"], event.data)[2] : `PLSC-LICENSE-${Date.now()}`;

        showSuccess();
      } catch(err) {
        alert("Transaction failed: " + (err.message || err));
      }
      payBtn.innerHTML = "💎 Pay & Activate Now";
      payBtn.disabled = false;
    }

    function showSuccess() {
      document.getElementById("result").innerHTML = `
        <div class="success">
          <strong style="color:#22c55e">✅ License Purchased Successfully!</strong><br><br>
          <strong>License Key:</strong><br>
          <code style="background:#1e2937;padding:12px;border-radius:8px;display:block;margin:12px 0;">${licenseKey}</code>
          <button onclick="sendLicenseToDevice()" style="background:#22d3ee;color:#0a0c1f;padding:16px 40px;border-radius:12px;font-size:1.1em;">📲 Send License to Device Now</button>
        </div>`;
      document.getElementById("result").style.display = "block";
    }

    async function sendLicenseToDevice() {
      if (!licenseKey) return;
      try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        const writer = port.writable.getWriter();
        await writer.write(new TextEncoder().encode(`LICENSE:${licenseKey}\n`));
        writer.releaseLock();
        alert("✅ License successfully sent to device!");
      } catch(e) { alert("Failed to send to device. Make sure it's connected."); }
    }

    // Mesh Background
    const canvas = document.getElementById('mesh-bg');
    const ctx = canvas.getContext('2d');
    function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    let nodes = []; for(let i=0;i<72;i++) nodes.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.7,vy:(Math.random()-0.5)*0.7});
    let particles = [];
    let mouse = {x:0,y:0,active:false};
    window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;mouse.active=true;});
    window.addEventListener('mouseleave',()=>mouse.active=false);
    function animate(){
      ctx.fillStyle = 'rgba(10,12,31,0.16)'; ctx.fillRect(0,0,canvas.width,canvas.height);
      requestAnimationFrame(animate);
    }
    animate();

    window.onload = connectWallet;
  </script>
</body>
</html>
