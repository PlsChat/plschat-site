<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat - Buy License</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0c1f;
      color: #c9d1d9;
      margin: 0;
      padding: 40px 20px;
      min-height: 100vh;
      text-align: center;
      position: relative;
      overflow-y: auto;
    }
    #mesh-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: -1;
      opacity: 0.95;
    }
    .container { 
      max-width: 700px; 
      margin: 0 auto; 
      position: relative; 
      z-index: 2; 
    }
    h1 {
      font-size: 3.2em;
      background: linear-gradient(90deg, #a855f7, #67e8f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .price {
      font-size: 2.8em;
      color: #67e8f9;
      margin: 20px 0;
    }
    .benefits {
      text-align: left;
      max-width: 500px;
      margin: 30px auto;
      background: rgba(30,30,50,0.8);
      padding: 25px;
      border-radius: 16px;
    }
    button {
      padding: 20px 50px;
      font-size: 1.4em;
      font-weight: 700;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      margin: 20px;
      transition: all 0.3s;
    }
    .btn-buy {
      background: linear-gradient(135deg, #a855f7, #c084fc);
      color: white;
    }
    .status {
      margin-top: 30px;
      padding: 25px;
      border-radius: 16px;
      background: rgba(30, 30, 50, 0.9);
      min-height: 120px;
      font-size: 1.1em;
    }
  </style>
</head>
<body>
  <canvas id="mesh-bg"></canvas>
  <div class="container">
    <h1>Buy Lifetime License</h1>
    <p style="font-size:1.5em; margin:20px 0;">Unlock Full Premium Features + Rewards</p>
    
    <div class="price">100 PLSC</div>

    <div class="benefits">
      <strong>What you get:</strong><br><br>
      • Full Repeater Mode<br>
      • Persistent Room Server Access<br>
      • Store & Forward Messages<br>
      • Earn PLSC Rewards<br>
      • Lifetime License (no renewal)
    </div>

    <button class="btn-buy" onclick="buyLicense()">💎 Pay 100 PLSC Now</button>
    
    <div class="status" id="status">
      Connect your wallet to purchase a license
    </div>
  </div>

  <script>
    // ==================== FULL ANIMATED BACKGROUND ====================
    const canvas = document.getElementById('mesh-bg');
    const ctx = canvas.getContext('2d');
   
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    let nodes = [];
    for (let i = 0; i < 60; i++) {
      nodes.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: 3.8,
        vx: (Math.random() - 0.5) * 0.8,
        vy: (Math.random() - 0.5) * 0.8
      });
    }
    let particles = [];
    let mouse = { x: 0, y: 0, active: false };

    window.addEventListener('mousemove', e => { 
      mouse.x = e.clientX; 
      mouse.y = e.clientY; 
      mouse.active = true; 
    });
    window.addEventListener('mouseleave', () => mouse.active = false);

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      nodes.forEach(node => {
        if (mouse.active) {
          const dx = node.x - mouse.x;
          const dy = node.y - mouse.y;
          const dist = Math.hypot(dx, dy);
          if (dist < 280 && dist > 0) {
            const force = (280 - dist) / 280 * 0.6;
            node.vx += (dx / dist) * force;
            node.vy += (dy / dist) * force;
          }
        }
        node.x += node.vx;
        node.y += node.vy;

        const margin = 40;
        if (node.x < margin) { node.x = margin; node.vx *= -0.9; }
        if (node.x > canvas.width - margin) { node.x = canvas.width - margin; node.vx *= -0.9; }
        if (node.y < margin) { node.y = margin; node.vy *= -0.9; }
        if (node.y > canvas.height - margin) { node.y = canvas.height - margin; node.vy *= -0.9; }

        ctx.beginPath();
        ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#67e8f9';
        ctx.shadowBlur = 30;
        ctx.shadowColor = '#67e8f9';
        ctx.fill();
      });

      ctx.strokeStyle = '#c084fc';
      ctx.lineWidth = 1.8;
      nodes.forEach((node, i) => {
        nodes.forEach((other, j) => {
          if (i < j) {
            const dist = Math.hypot(node.x - other.x, node.y - other.y);
            if (dist < 240) {
              ctx.globalAlpha = (240 - dist) / 240 * 0.85;
              ctx.beginPath();
              ctx.moveTo(node.x, node.y);
              ctx.lineTo(other.x, other.y);
              ctx.stroke();

              if (Math.random() < 0.15) {
                particles.push({
                  x: node.x,
                  y: node.y,
                  tx: other.x,
                  ty: other.y,
                  progress: 0,
                  speed: 0.05 + Math.random() * 0.03
                });
              }
            }
          }
        });
      });

      ctx.fillStyle = '#67e8f9';
      ctx.shadowBlur = 22;
      ctx.shadowColor = '#67e8f9';
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.progress += p.speed;
        if (p.progress > 1) {
          particles.splice(i, 1);
          continue;
        }
        const x = p.x + (p.tx - p.x) * p.progress;
        const y = p.y + (p.ty - p.y) * p.progress;
        ctx.beginPath();
        ctx.arc(x, y, 3.8, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      requestAnimationFrame(animate);
    }
    animate();

    // ==================== BUY LICENSE LOGIC ====================
    let userAddress = null;

    async function connectWallet() {
      if (window.ethereum) {
        try {
          const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
          userAddress = accounts[0];
          document.getElementById('status').innerHTML = `✅ Wallet Connected: ${userAddress.substring(0,8)}...`;
        } catch (e) {
          alert("Wallet connection failed");
        }
      } else {
        alert("Please install MetaMask or another wallet");
      }
    }

    async function buyLicense() {
      if (!userAddress) {
        await connectWallet();
        return;
      }

      const status = document.getElementById('status');
      status.innerHTML = "🔄 Processing transaction on PulseChain...";

      setTimeout(() => {
        status.innerHTML = `
          ✅ License Purchased Successfully!<br><br>
          <strong>License Key:</strong><br>
          PLSC-LICENSE-${userAddress.substring(2,10)}-1747000000<br><br>
          Your device is now fully licensed for lifetime use.
        `;
      }, 2500);
    }

    window.onload = connectWallet;
  </script>
</body>
</html>
