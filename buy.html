<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buy License - PLSChat</title>
  <style>
    body { font-family: 'Inter', Arial, sans-serif; background: #0d1117; color: #c9d1d9; text-align: center; padding: 40px; }
    .card { background: #161b22; border-radius: 16px; padding: 30px; max-width: 500px; margin: 20px auto; }
    button { padding: 14px 28px; font-size: 1.05em; margin: 8px; border: none; border-radius: 10px; cursor: pointer; }
    .btn-annual { background: #f0b429; color: black; font-weight: bold; }
    .btn-lifetime { background: #238636; color: white; font-weight: bold; }
    .btn-mm { background: #f6851b; color: white; }
    .btn-zkx { background: #6f42c1; color: white; }
  </style>
</head>
<body>
  <h1>Buy PLSChat License</h1>
  <p id="mac-display">Device MAC: Loading...</p>
  <p id="wallet-status" style="color:#8b949e;">No wallet connected</p>

  <div class="card">
    <h2>Annual License — 15 PLSC</h2>
    <button class="btn-mm" onclick="connectWallet('metamask')">MetaMask</button>
    <button class="btn-zkx" onclick="connectWallet('zkx')">ZKX (Private)</button>
    <button class="btn-annual" onclick="buyLicense('annual')">Buy Annual License</button>
  </div>

  <div class="card">
    <h2>Lifetime License — 50 PLSC</h2>
    <button class="btn-mm" onclick="connectWallet('metamask')">MetaMask</button>
    <button class="btn-zkx" onclick="connectWallet('zkx')">ZKX (Private)</button>
    <button class="btn-lifetime" onclick="buyLicense('lifetime')">Buy Lifetime License</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const mac = params.get('mac');
    if (mac) document.getElementById('mac-display').textContent = `Device MAC: ${mac}`;

    let connectedWallet = "";
    let isZKX = false;

    async function connectWallet(type) {
      if (type === 'metamask') {
        if (typeof window.ethereum !== 'undefined') {
          try {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            connectedWallet = accounts[0];
            isZKX = false;
            document.getElementById('wallet-status').innerHTML = `✅ MetaMask Connected: ${connectedWallet.substring(0,6)}...${connectedWallet.substring(38)}`;
          } catch (e) { alert("MetaMask connection cancelled"); }
        } else {
          alert("Please install MetaMask");
        }
      } else if (type === 'zkx') {
        alert("ZKX Wallet connection coming soon!\n\nWe'll add full shielded transaction support shortly.");
        // Future ZKX integration code goes here
      }
    }

    async function buyLicense(type) {
      if (!connectedWallet) {
        alert("Please connect a wallet first (MetaMask or ZKX)");
        return;
      }
      const amount = type === 'annual' ? 15 : 50;
      alert(`✅ Ready to purchase ${type} license (${amount} PLSC)\nDevice: ${mac}\nWallet: ${connectedWallet}\n\nTransaction will be sent from your wallet.`);
    }
  </script>
</body>
</html>
