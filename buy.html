<body>
  <canvas id="mesh-bg"></canvas>
  <div class="container">
    <button onclick="window.location.href='device-manager.html'" style="position:absolute;top:25px;left:25px;padding:10px 20px;background:rgba(30,41,59,0.9);">← Back</button>

    </div>

    <button onclick="confirmPayment()" class="btn-primary" style="font-size:1.4em;padding:22px 60px;">✅ I Have Sent Payment</button>
