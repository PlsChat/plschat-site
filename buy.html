<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat - Buy License</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.2/ethers.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0a0c1f; color: #c9d1d9; margin:0; padding:40px 20px; min-height:100vh; position:relative; overflow-y:auto; }
    #mesh-bg { position:fixed; top:0; left:0; right:0; bottom:0; z-index:-1; opacity:0.95; }
    .container { max-width:820px; margin:0 auto; text-align:center; position:relative; z-index:2; }
    h1 { font-size:3.4em; background:linear-gradient(90deg,#a855f7,#67e8f9); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
    .wallet-info { background:#1e2937; padding:12px; border-radius:8px; margin:15px 0; font-family:monospace; min-height:52px; }
    .device-box { background:rgba(15,23,42,0.95); padding:25px; border-radius:16px; margin:30px auto; max-width:620px; text-align:center; }
    button { padding:16px 36px; font-size:1.15em; font-weight:600; border:none; border-radius:14px; cursor:pointer; margin:8px; transition:all 0.3s; }
    .btn-primary { background:linear-gradient(135deg,#a855f7,#3b82f6); color:white; box-shadow:0 8px 25px rgba(168,85,247,0.5); }
    .btn-primary:hover { transform:translateY(-4px); }
    .selected { box-shadow:0 0 0 4px #22c55e !important; }
    .selected::after { content:" ✅"; }
    .benefit-box, .token-selector { background:rgba(15,23,42,0.95); padding:22px; border-radius:16px; margin:20px auto; max-width:620px; text-align:center; }
    select { padding:12px; font-size:1.1em; background:#1e2937; color:white; border-radius:8px; width:100%; max-width:400px; }
  </style>
</head>
<body>
  <canvas id="mesh-bg"></canvas>
 
  <div class="container">
    <button onclick="window.location.href='device-manager.html'" style="position:absolute; top:25px; left:25px; padding:10px 20px; background:rgba(30,41,59,0.9); color:white;">← Back to Home</button>
    <h1>Buy License</h1>
    <p style="font-size:1.4em;color:#94a3b8;">Unlock Full Features + Rewards</p>

    <button onclick="connectWallet()" id="connectBtn" class="btn-primary" style="margin-bottom:20px;">🔗 Connect MetaMask</button>
    <div id="walletInfo" class="wallet-info">Wallet not connected</div>

    <button onclick="detectDevice()" id="detectBtn" class="btn-primary">🔍 Detect Connected Heltec Device</button>

    <div id="deviceBox" class="device-box" style="display:none;">
      <strong>Detected Device</strong><br><br>
      <div id="deviceDetails" style="font-size:1.1em;"></div>
      <button onclick="useDetectedDevice()" class="btn-primary" style="margin-top:15px;">✅ Use This Device</button>
    </div>

    <div style="margin:40px 0;">
      <button onclick="selectType('lifetime')" id="btnLifetime" class="btn-primary">Lifetime — 100 PLSC</button>
      <button onclick="selectType('yearly')" id="btnYearly" class="btn-primary">Yearly — 20 PLSC</button>
    </div>

    <div class="token-selector">
      <strong>Pay with:</strong><br><br>
      <select id="paymentToken" onchange="updateEquivalentPrice()">
        <option value="PLSC">PLSC</option>
        <option value="PLS">PLS</option>
        <option value="PLSX">PLSX</option>
        <option value="pDAI">pDAI</option>
        <option value="pCOCK">pCOCK</option>
        <option value="WBTC">WBTC</option>
      </select>
      <div id="equivalentPrice" style="margin-top:15px; font-size:1.25em; color:#67e8f9; font-weight:600;"></div>
    </div>

    <button id="payBtn" class="btn-primary" onclick="buyLicense()" style="font-size:1.35em;padding:20px 50px;">💎 Pay & Activate Now</button>
  </div>

  <script>
    const CONTRACT_ADDRESS = "0x17B46bB02DF36E57B2b5015C4e289b984915EfE5";
    let signer = null;
    let contract = null;
    let selectedType = 'lifetime';
    let selectedMac = '';

    const ABI = [
      "function buyLicense(string calldata deviceHardwareId) external",
      "function approve(address spender, uint256 amount) external returns (bool)",
      "function allowance(address owner, address spender) view returns (uint256)"
    ];

    async function connectWallet() {
      const btn = document.getElementById("connectBtn");
      const info = document.getElementById("walletInfo");
      btn.innerHTML = "⏳ Connecting...";
      btn.disabled = true;
      try {
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        const provider = new ethers.BrowserProvider(window.ethereum);
        signer = await provider.getSigner();
        contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
        info.innerHTML = `✅ Connected: <strong>${accounts[0]}</strong>`;
      } catch (e) {
        info.innerHTML = "❌ Connection failed";
      }
      btn.innerHTML = "🔗 Connect MetaMask";
      btn.disabled = false;
    }

    // ... keep your existing detectDevice, selectType, updateEquivalentPrice functions ...

    async function buyLicense() {
      if (!signer) return alert("Please connect your wallet first.");
      if (!selectedMac) return alert("Please detect your device first.");

      const payBtn = document.getElementById("payBtn");
      payBtn.innerHTML = "⏳ Checking approval...";
      payBtn.disabled = true;

      try {
        const userAddress = await signer.getAddress();
        const allowance = await contract.allowance(userAddress, CONTRACT_ADDRESS);

        if (allowance < 100000000000000000000n) {
          payBtn.innerHTML = "⏳ Approving PLSC...";
          const approveTx = await contract.approve(CONTRACT_ADDRESS, ethers.MaxUint256);
          await approveTx.wait();
          alert("✅ PLSC Approved! Now sending license transaction...");
        }

        payBtn.innerHTML = "⏳ Sending License Transaction...";
        const tx = await contract.buyLicense(selectedMac);
        await tx.wait();
        alert(`✅ Success! License activated.\n\nTX: ${tx.hash}`);
      } catch (err) {
        console.error(err);
        alert("Transaction failed: " + (err.reason || err.message));
      }

      payBtn.innerHTML = "💎 Pay & Activate Now";
      payBtn.disabled = false;
    }

    // (Keep the rest of your code: detectDevice, selectType, updateEquivalentPrice, mesh background, etc.)
    // Paste the rest from your previous file here if needed
  </script>
</body>
</html>
