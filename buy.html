<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat - Buy License</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0a0c1f; color: #c9d1d9; margin:0; padding:40px 20px; min-height:100vh; position:relative; overflow-y:auto; }
    #mesh-bg { position:fixed; top:0; left:0; right:0; bottom:0; z-index:-1; opacity:0.95; }
    .container { max-width:820px; margin:0 auto; text-align:center; position:relative; z-index:2; }
    h1 { font-size:3.4em; background:linear-gradient(90deg,#a855f7,#67e8f9); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
    .subtitle { color:#94a3b8; font-size:1.35em; margin-bottom:30px; }
   
    .btn-back {
      position: absolute; top: 25px; left: 25px;
      padding: 10px 24px;
      background: linear-gradient(135deg, #a855f7, #3b82f6);
      color: white;
      border: none;
      border-radius: 9999px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(168,85,247,0.4);
    }
   
    button {
      padding: 16px 36px;
      font-size: 1.15em;
      font-weight: 600;
      border: none;
      border-radius: 9999px;
      cursor: pointer;
      margin: 8px;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .btn-primary { background: linear-gradient(135deg, #a855f7, #3b82f6); color: white; }
    .btn-primary:hover { transform: translateY(-3px); }
    .selected { box-shadow: 0 0 0 4px #22c55e !important; }
   
    .wallet-info, .device-box, .price-info {
      background: #1e2937;
      padding: 15px;
      border-radius: 12px;
      margin: 15px 0;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="btn-back" onclick="window.location.href='device-manager.html'">← Back to Home</button>
    <h1>Buy License</h1>
    <p class="subtitle">Payment first → Licence after verification</p>
    <button onclick="connectWallet()" class="btn-primary">🔗 Connect MetaMask</button>
    <div id="walletInfo" class="wallet-info">Wallet not connected</div>
    <button onclick="connectDevice()" class="btn-primary">🔌 Detect Connected Heltec Device</button>
    <div id="deviceInfo" class="device-box">No device detected yet</div>
    <div style="margin:30px 0;">
      <button id="btnLifetime" class="btn-primary" onclick="selectType('lifetime')">Lifetime — 100 PLSC</button>
      <button id="btnYearly" class="btn-primary" onclick="selectType('yearly')">Yearly — 20 PLSC</button>
    </div>
    <div id="benefitBox" class="price-info" style="min-height:80px;"></div>
    <div style="margin:20px 0;">
      <label>Pay with:</label><br>
      <select id="tokenSelect" onchange="updatePriceInfo()" style="padding:12px; background:#1e2937; color:white; border:none; border-radius:8px; font-size:1.1em;">
        <option value="PLSC">PLSC</option>
        <option value="PLS">PLS</option>
        <option value="PDAI">PDAI</option>
        <option value="PLSX">PLSX</option>
        <option value="WBTC">WBTC</option>
      </select>
    </div>
    <div id="priceInfo" class="price-info"></div>
    <button onclick="buyLicense()" id="payBtn" class="btn-primary" style="font-size:1.3em; padding:20px 50px;">💎 Send Exact Amount via MetaMask</button>
  </div>
  <canvas id="mesh-bg"></canvas>
  <script>
    let walletAddress = '';
    let selectedMac = '';
    let selectedType = '';
    let selectedToken = 'PLSC';
    const TREASURY = "0xe160d657c7d98f5c7e14fdc38b9b03911538fe70";
    const PLSC_PRICE_GBP = 0.75;

    async function connectWallet() {
      try {
        if (!window.ethereum) return alert("MetaMask not found");
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        walletAddress = accounts[0];
        document.getElementById("walletInfo").innerHTML = `✅ Connected: ${walletAddress.substring(0,6)}...${walletAddress.substring(38)}`;
      } catch (e) {
        alert("Wallet connection failed");
      }
    }

    async function connectDevice() {
      try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        const reader = port.readable.getReader();
        let buffer = '';
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += new TextDecoder().decode(value);
          const macMatch = buffer.match(/MAC:([0-9A-F:]+)/i);
          if (macMatch) {
            selectedMac = macMatch[1];
            document.getElementById("deviceInfo").innerHTML = `✅ Device Connected<br>MAC: <strong>${selectedMac}</strong>`;
            break;
          }
        }
      } catch (e) {
        alert("Device connection failed. Hold BOOT button and try again.");
      }
    }

    function selectType(type) {
      selectedType = type;
      document.getElementById("btnLifetime").classList.toggle('selected', type === 'lifetime');
      document.getElementById("btnYearly").classList.toggle('selected', type === 'yearly');
      updatePriceInfo();
    }

    function updatePriceInfo() {
      const amountPLSC = selectedType === 'lifetime' ? 100 : 20;
      const gbp = amountPLSC * PLSC_PRICE_GBP;
      document.getElementById("priceInfo").innerHTML = `<strong>${amountPLSC} PLSC</strong> ≈ £${gbp.toFixed(2)}<br>Paying with <strong>${selectedToken}</strong>`;
    }

    async function buyLicense() {
      if (!walletAddress) return alert("Please connect wallet first");
      if (!selectedMac) return alert("Please detect device first");
      if (!selectedType) return alert("Please choose Lifetime or Yearly");

      // === BLOCK DUPLICATE LICENCE FOR SAME MAC ===
      let licenses = JSON.parse(localStorage.getItem('licenses') || '{}');
      if (licenses[selectedMac]) {
        return alert("❌ This device (MAC) already has an active licence.\n\nYou cannot purchase another licence for the same MAC address.");
      }

      const amountPLSC = selectedType === 'lifetime' ? 100 : 20;
      const isYearly = selectedType === 'yearly';
      const purchaseTime = Date.now();
      const expiryTime = isYearly ? purchaseTime + (365 * 24 * 60 * 60 * 1000) : 0;

      licenses[selectedMac] = {
        key: `PLSC-LICENSE-${selectedMac.replace(/:/g,'')}-${purchaseTime}`,
        purchaseTime: purchaseTime,
        expiryTime: expiryTime,
        type: selectedType,
        amountPLSC: amountPLSC
      };

      localStorage.setItem('licenses', JSON.stringify(licenses));

      alert(`✅ Licence purchased and recorded!\n\nMAC: ${selectedMac}\nType: ${selectedType}\nExpiry: ${isYearly ? "365 days" : "Lifetime"}\n\nYou can now go to the Flasher page to apply it.`);
    }

    // Mesh background
    const canvas = document.getElementById('mesh-bg');
    const ctx = canvas.getContext('2d');
    function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    let nodes = []; for(let i=0;i<72;i++) nodes.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.7,vy:(Math.random()-0.5)*0.7});
    function animate(){
      ctx.fillStyle = 'rgba(10,12,31,0.16)'; ctx.fillRect(0,0,canvas.width,canvas.height);
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
