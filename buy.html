<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat - Buy License</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0a0c1f; color: #c9d1d9; margin:0; padding:40px 20px; min-height:100vh; position:relative; overflow-y:auto; }
    #mesh-bg { position:fixed; top:0; left:0; right:0; bottom:0; z-index:-1; opacity:0.95; }
    .container { max-width:820px; margin:0 auto; text-align:center; position:relative; z-index:2; }
    h1 { font-size:3.4em; background:linear-gradient(90deg,#a855f7,#67e8f9); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
    .wallet-info { background:#1e2937; padding:12px; border-radius:8px; margin:15px 0; font-family:monospace; min-height:52px; }
    .device-box { background:rgba(15,23,42,0.95); padding:25px; border-radius:16px; margin:30px auto; max-width:620px; text-align:center; }
    button { padding:16px 36px; font-size:1.15em; font-weight:600; border:none; border-radius:14px; cursor:pointer; margin:8px; transition:all 0.3s; }
    .btn-primary { background:linear-gradient(135deg,#a855f7,#3b82f6); color:white; box-shadow:0 8px 25px rgba(168,85,247,0.5); }
    .btn-primary:hover { transform:translateY(-4px); }
    .selected { box-shadow:0 0 0 4px #22c55e !important; }
    .benefit-box, .token-selector { background:rgba(15,23,42,0.95); padding:22px; border-radius:16px; margin:20px auto; max-width:620px; text-align:center; }
    select { padding:12px; font-size:1.1em; background:#1e2937; color:white; border-radius:8px; width:100%; max-width:400px; }
  </style>
</head>
<body>
  <canvas id="mesh-bg"></canvas>
  <div class="container">
    <button onclick="window.location.href='device-manager.html'" style="position:absolute;top:25px;left:25px;padding:10px 20px;background:rgba(30,41,59,0.9);color:white;border-radius:9999px;">← Back to Home</button>
    <h1>Buy License</h1>
    <p style="font-size:1.4em;color:#94a3b8;">Payment first → Licence after verification</p>

    <button onclick="connectWallet()" id="connectBtn" class="btn-primary">🔗 Connect MetaMask</button>
    <div id="walletInfo" class="wallet-info">Wallet not connected</div>

    <button onclick="detectDevice()" id="detectBtn" class="btn-primary">🔍 Detect Connected Heltec Device</button>

    <div id="deviceBox" class="device-box" style="display:none;">
      <strong>Detected Device</strong><br><br>
      <div id="deviceDetails" style="font-size:1.1em;"></div>
      <button onclick="useDetectedDevice()" class="btn-primary" style="margin-top:15px;">✅ Use This Device</button>
    </div>

    <div style="margin:40px 0;">
      <button onclick="selectType('lifetime')" id="btnLifetime" class="btn-primary">Lifetime — 100 PLSC</button>
      <button onclick="selectType('yearly')" id="btnYearly" class="btn-primary">Yearly — 20 PLSC</button>
    </div>

    <div class="token-selector">
      <strong>Pay with:</strong><br><br>
      <select id="paymentToken" onchange="updateEquivalentPrice()">
        <option value="PLS">PLS</option>
        <option value="PLSC">PLSC</option>
        <option value="PLSX">PLSX</option>
        <option value="pDAI">pDAI</option>
        <option value="pCOCK">pCOCK</option>
        <option value="WBTC">WBTC</option>
      </select>
      <div id="equivalentPrice" style="margin-top:15px; font-size:1.25em; color:#67e8f9; font-weight:600;"></div>
    </div>

    <button id="payBtn" class="btn-primary" onclick="sendPayment()" style="font-size:1.35em;padding:20px 50px;">💎 Send Exact Amount via MetaMask</button>
  </div>

  <script>
    const TREASURY = "0xe160d657c7d98f5c7e14fdc38b9b03911538fe70".toLowerCase();
    const PLSC_CONTRACT = "0x17B46bB02DF36E57B2b5015C4e289b984915EfE5".toLowerCase();
    let walletAddress = null;
    let selectedMac = '';
    let selectedType = 'lifetime';

    async function connectWallet() {
      try {
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        walletAddress = accounts[0];
        document.getElementById("walletInfo").innerHTML = `✅ Connected: <strong>${walletAddress}</strong>`;
      } catch (e) {
        document.getElementById("walletInfo").innerHTML = "❌ Connection failed";
      }
    }

    async function detectDevice() {
      const btn = document.getElementById("detectBtn");
      btn.innerHTML = "⏳ Reading device... (hold BOOT button)";
      btn.disabled = true;

      try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        const reader = port.readable.getReader();
        let buffer = '';

        const timeout = setTimeout(() => { reader.cancel(); }, 35000);

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          buffer += new TextDecoder().decode(value);

          // Stronger regex - matches your exact output
          const macMatch = buffer.match(/MAC[:\s]*([0-9A-F:]{17})/i);
          if (macMatch) {
            clearTimeout(timeout);
            reader.cancel();
            selectedMac = macMatch[1];
            const licensed = buffer.includes('LICENSED:YES') ? '✅ Licensed' : '❌ Not Licensed';
            document.getElementById("deviceDetails").innerHTML = `
              MAC: <strong>${selectedMac}</strong><br>
              Status: ${licensed}
            `;
            document.getElementById("deviceBox").style.display = 'block';
            break;
          }
        }
      } catch (e) {
        alert("Could not read device.\n\nMake sure:\n1. Heltec is plugged in\n2. You held the BOOT button while clicking Detect");
      }

      btn.innerHTML = "🔍 Detect Connected Heltec Device";
      btn.disabled = false;
    }

    function useDetectedDevice() {
      alert(`✅ MAC ${selectedMac} selected for licensing.`);
    }

    function selectType(type) {
      selectedType = type;
      document.getElementById("btnLifetime").classList.toggle('selected', type === 'lifetime');
      document.getElementById("btnYearly").classList.toggle('selected', type === 'yearly');
      updateEquivalentPrice();
    }

    async function updateEquivalentPrice() {
      // Your existing price code (unchanged)
    }

    async function sendPayment() {
      if (!walletAddress) return alert("Please connect your wallet first.");
      if (!selectedMac || selectedMac === 'Unknown') return alert("Please detect your device first.");

      // === DUPLICATE LICENCE BLOCK ===
      let licenses = JSON.parse(localStorage.getItem('licenses') || '{}');
      if (licenses[selectedMac]) {
        return alert("❌ A licence has already been purchased for this MAC address.\n\nYou cannot buy another licence for the same device.");
      }

      // ... rest of your payment code (unchanged)
    }

    async function verifyAndGenerateLicense() {
      // your existing code
    }

    // Mesh Background (unchanged)
    const canvas = document.getElementById('mesh-bg');
    const ctx = canvas.getContext('2d');
    function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    function animate(){
      ctx.fillStyle = 'rgba(10,12,31,0.16)'; ctx.fillRect(0,0,canvas.width,canvas.height);
      requestAnimationFrame(animate);
    }
    animate();

    window.onload = () => fetchLivePrices().then(() => updateEquivalentPrice());
  </script>
</body>
</html>
