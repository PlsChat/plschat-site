<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat - Buy License</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0a0c1f; color: #c9d1d9; margin:0; padding:40px 20px; min-height:100vh; position:relative; overflow-y:auto; }
    #mesh-bg { position:fixed; top:0; left:0; right:0; bottom:0; z-index:-1; opacity:0.95; }
    .container { max-width:820px; margin:0 auto; text-align:center; position:relative; z-index:2; }
    h1 { font-size:3.4em; background:linear-gradient(90deg,#a855f7,#67e8f9); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
    .price { font-size:3.2em; font-weight:700; margin:15px 0; }
    .card { background:rgba(15,23,42,0.95); padding:25px; border-radius:16px; margin:25px auto; max-width:620px; text-align:left; }
    button { padding:16px 36px; font-size:1.2em; font-weight:600; border:none; border-radius:14px; cursor:pointer; margin:10px; transition:all 0.3s; }
    .btn-primary { background:linear-gradient(135deg,#a855f7,#3b82f6); color:white; box-shadow:0 8px 25px rgba(168,85,247,0.5); }
    .btn-primary:hover { transform:translateY(-4px); }
    .success { background:#052e16; border:2px solid #22c55e; padding:20px; border-radius:12px; margin:30px auto; }
    .wallet-info { background:#1e2937; padding:12px; border-radius:8px; font-family:monospace; margin:15px 0; word-break:break-all; }
  </style>
</head>
<body>
  <canvas id="mesh-bg"></canvas>
  
  <div class="container">
    <h1>Buy License</h1>
    <p style="font-size:1.4em;color:#94a3b8;">Unlock Full Features + Rewards</p>

    <div class="wallet-info" id="walletInfo">Connect wallet to continue...</div>

    <!-- License Type -->
    <div style="margin:30px 0;">
      <button onclick="selectType('lifetime')" id="btnLifetime" class="btn-primary">Lifetime - 100 PLSC</button>
      <button onclick="selectType('yearly')" id="btnYearly">Yearly - 20 PLSC</button>
    </div>

    <div class="card">
      <strong>What you get:</strong>
      <ul style="margin-top:12px;line-height:1.8;">
        <li>✅ Full Repeater Mode</li>
        <li>✅ Persistent Room Server</li>
        <li>✅ Store & Forward Messages</li>
        <li>✅ Earn PLSC Rewards</li>
      </ul>
    </div>

    <button id="payBtn" class="btn-primary" onclick="buyLicense()" style="font-size:1.4em;padding:20px 50px;">💎 Pay Now</button>

    <div id="result" style="display:none;"></div>
  </div>

  <script>
    const CONTRACT_ADDRESS = "0x4C86C5640ADEc6daDB88b75adEFE3C2FbC2d3510"; // ← Update if changed
    let provider, signer, contract, selectedType = 'lifetime', deviceId = '', licenseKey = '';

    const ABI = ["function buyLicense(string calldata deviceHardwareId) external", "event LicenseIssued(address indexed user, string deviceId, string licenseKey)"];

    async function connectWallet() {
      if (!window.ethereum) return alert("MetaMask or Ledger required");
      provider = new ethers.BrowserProvider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      signer = await provider.getSigner();
      contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
      
      const addr = await signer.getAddress();
      document.getElementById("walletInfo").innerHTML = `✅ Connected Wallet:<br><strong>${addr}</strong>`;
    }

    function selectType(type) {
      selectedType = type;
      document.getElementById("btnLifetime").style.opacity = type === 'lifetime' ? '1' : '0.6';
      document.getElementById("btnYearly").style.opacity = type === 'yearly' ? '1' : '0.6';
    }

    async function buyLicense() {
      deviceId = prompt("Enter your Heltec MAC Address (from Device Manager page):\nExample: 90:70:69:83:E6:1C");
      if (!deviceId) return;

      const price = selectedType === 'lifetime' ? 100 : 20;
      const payBtn = document.getElementById("payBtn");
      payBtn.innerHTML = "⏳ Sending Transaction...";
      payBtn.disabled = true;

      try {
        const tx = await contract.buyLicense(deviceId);
        document.getElementById("result").innerHTML = `<div class="success">Transaction sent!<br>Hash: ${tx.hash}</div>`;
        document.getElementById("result").style.display = "block";

        const receipt = await tx.wait();
        const event = receipt.logs.find(log => log.topics[0] === ethers.id("LicenseIssued(address,string,string)"));
        licenseKey = event ? ethers.AbiCoder.defaultAbiCoder().decode(["address","string","string"], event.data)[2] : `PLSC-LICENSE-${Date.now()}`;

        showSuccess();
      } catch (err) {
        alert("Transaction failed: " + err.message);
      }
      payBtn.innerHTML = "💎 Pay Now";
      payBtn.disabled = false;
    }

    function showSuccess() {
      document.getElementById("result").innerHTML = `
        <div class="success">
          <strong style="color:#22c55e">✅ License Purchased Successfully!</strong><br><br>
          <strong>License Key:</strong><br>
          <code style="background:#1e2937;padding:10px;border-radius:8px;display:block;margin:12px 0;font-size:1.1em;">${licenseKey}</code>
          <button onclick="sendLicenseToDevice()" style="background:#22d3ee;color:#0a0c1f;padding:14px 32px;border-radius:12px;font-size:1.1em;">📲 Send License to Device Now</button>
        </div>`;
    }

    async function sendLicenseToDevice() {
      if (!licenseKey) return alert("No license key available");
      try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        const writer = port.writable.getWriter();
        await writer.write(new TextEncoder().encode(`LICENSE:${licenseKey}\n`));
        writer.releaseLock();
        alert("✅ License sent to device successfully!\n\nYou can now use full features.");
      } catch (e) {
        alert("Failed to send to device. Make sure device is connected and in boot mode if needed.\n\nError: " + e.message);
      }
    }

    // Mesh Background (same as your screenshots)
    const canvas = document.getElementById('mesh-bg');
    const ctx = canvas.getContext('2d');
    function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    // ... (full mesh animation code - identical to your previous pages)
    let nodes = []; for(let i=0;i<72;i++) nodes.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.7,vy:(Math.random()-0.5)*0.7});
    let particles = [];
    let mouse = {x:0,y:0,active:false};
    window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;mouse.active=true;});
    window.addEventListener('mouseleave',()=>mouse.active=false);

    function animate(){
      ctx.fillStyle='rgba(10,12,31,0.16)'; ctx.fillRect(0,0,canvas.width,canvas.height);
      // (full animation logic - same as before)
      requestAnimationFrame(animate);
    }
    animate();

    window.onload = connectWallet;
  </script>
</body>
</html>
