<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat - Buy License</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0a0c1f; color: #c9d1d9; margin:0; padding:40px 20px; min-height:100vh; position:relative; overflow-y:auto; }
    #mesh-bg { position:fixed; top:0; left:0; right:0; bottom:0; z-index:-1; opacity:0.95; }
    .container { max-width:820px; margin:0 auto; text-align:center; position:relative; z-index:2; }
    h1 { font-size:3.4em; background:linear-gradient(90deg,#a855f7,#67e8f9); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
    .device-box { background:rgba(15,23,42,0.95); padding:20px; border-radius:16px; margin:25px auto; max-width:620px; text-align:left; font-family:monospace; }
    button { padding:16px 36px; font-size:1.15em; font-weight:600; border:none; border-radius:14px; cursor:pointer; margin:10px; transition:all 0.3s; }
    .btn-primary { background:linear-gradient(135deg,#a855f7,#3b82f6); color:white; }
    .btn-primary:hover { transform:translateY(-4px); }
    .success { background:#052e16; border:2px solid #22c55e; padding:20px; border-radius:12px; margin:20px auto; }
  </style>
</head>
<body>
  <canvas id="mesh-bg"></canvas>
  
  <div class="container">
    <h1>Buy License</h1>
    <p style="font-size:1.4em;color:#94a3b8;">Unlock Full Features + Rewards</p>

    <div id="walletInfo" style="background:#1e2937;padding:12px;border-radius:8px;margin:15px 0;">Connect wallet to continue...</div>

    <button onclick="detectDevice()" class="btn-primary">🔍 Detect Connected Device</button>

    <div id="deviceBox" class="device-box" style="display:none;">
      <strong>Detected Device:</strong><br>
      <span id="deviceDetails"></span><br><br>
      <button onclick="useThisDevice()" class="btn-primary">✅ Use This Device for License</button>
    </div>

    <div style="margin:30px 0;">
      <button onclick="selectType('lifetime')" id="btnLifetime" class="btn-primary">Lifetime - 100 PLSC</button>
      <button onclick="selectType('yearly')" id="btnYearly">Yearly - 20 PLSC</button>
    </div>

    <input type="text" id="macInput" placeholder="MAC Address (auto-filled)" style="width:80%;padding:14px;margin:15px 0;background:#1e2937;border:1px solid #475569;border-radius:8px;color:white;font-family:monospace;" readonly>

    <button id="payBtn" class="btn-primary" onclick="buyLicense()" style="font-size:1.3em;padding:18px 50px;">💎 Pay & Activate License</button>

    <div id="result" style="display:none;"></div>
  </div>

  <script>
    // === WALLET & CONTRACT ===
    const CONTRACT_ADDRESS = "0x4C86C5640ADEc6daDB88b75adEFE3C2FbC2d3510";
    let provider, signer, contract, selectedType = 'lifetime', selectedMac = '';

    const ABI = ["function buyLicense(string calldata deviceHardwareId) external", "event LicenseIssued(address indexed user, string deviceId, string licenseKey)"];

    async function connectWallet() {
      provider = new ethers.BrowserProvider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      signer = await provider.getSigner();
      contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
      const addr = await signer.getAddress();
      document.getElementById("walletInfo").innerHTML = `✅ Connected: ${addr}`;
    }

    // === DEVICE DETECTION ===
    async function detectDevice() {
      try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        const reader = port.readable.getReader();
        let buffer = '';

        const timeout = setTimeout(() => reader.cancel(), 8000);

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += new TextDecoder().decode(value);

          if (buffer.includes('=== END_STATUS ===')) {
            clearTimeout(timeout);
            reader.cancel();

            const macMatch = buffer.match(/MAC:([0-9A-F:]+)/i);
            const licensed = buffer.includes('LICENSED:YES') ? '✅ Licensed' : '❌ Not Licensed';

            selectedMac = macMatch ? macMatch[1] : 'Unknown';
            
            document.getElementById("deviceDetails").innerHTML = `
              MAC: <strong>${selectedMac}</strong><br>
              Status: ${licensed}
            `;
            document.getElementById("deviceBox").style.display = 'block';
            document.getElementById("macInput").value = selectedMac;
            break;
          }
        }
      } catch (err) {
        alert("Could not detect device. Make sure it's plugged in and try again.");
      }
    }

    function useThisDevice() {
      document.getElementById("macInput").value = selectedMac;
      alert("MAC address loaded! You can now buy the license.");
    }

    function selectType(type) {
      selectedType = type;
      document.getElementById("btnLifetime").style.opacity = type === 'lifetime' ? '1' : '0.6';
      document.getElementById("btnYearly").style.opacity = type === 'yearly' ? '1' : '0.6';
    }

    async function buyLicense() {
      const mac = document.getElementById("macInput").value.trim();
      if (!mac) return alert("Please detect a device first");

    // Mesh Background (same as your screenshots)
    // ... (full canvas animation code - identical to previous working version)
    window.onload = connectWallet;
  </script>
</body>
</html>
