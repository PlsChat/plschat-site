<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat - Buy Lifetime License</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0a0c1f; color: #c9d1d9; margin: 0; padding: 40px 20px; min-height: 100vh; position: relative; overflow-y: auto; }
    #mesh-bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1; opacity: 0.95; }
    .container { max-width: 800px; margin: 0 auto; text-align: center; position: relative; z-index: 2; }
    h1 { font-size: 3.2em; background: linear-gradient(90deg, #a855f7, #67e8f9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
    .price { font-size: 4em; color: #67e8f9; font-weight: 700; margin: 20px 0; }
    .card { background: rgba(15,23,42,0.95); padding: 25px; border-radius: 16px; margin: 30px auto; text-align: left; max-width: 600px; }
    button { padding: 18px 40px; font-size: 1.3em; font-weight: 600; border: none; border-radius: 14px; cursor: pointer; background: linear-gradient(135deg, #a855f7, #3b82f6); color: white; margin: 20px 0; box-shadow: 0 8px 25px rgba(168,85,247,0.5); transition: all 0.3s; }
    button:hover { transform: translateY(-4px); box-shadow: 0 15px 35px rgba(168,85,247,0.7); }
    .success { background: #052e16; border: 2px solid #22c55e; padding: 20px; border-radius: 12px; margin: 30px auto; max-width: 600px; }
  </style>
</head>
<body>
  <canvas id="mesh-bg"></canvas>
  
  <div class="container">
    <h1>Buy Lifetime License</h1>
    <p style="font-size:1.4em; color:#94a3b8;">Unlock Full Premium Features + Rewards</p>
    <div class="price">100 PLSC</div>

    <div class="card">
      <strong>What you get:</strong>
      <ul style="margin-top:15px; line-height:1.8;">
        <li>✅ Full Repeater Mode</li>
        <li>✅ Persistent Room Server Access</li>
        <li>✅ Store & Forward Messaging</li>
        <li>✅ Earn PLSC Rewards</li>
        <li>✅ Lifetime License (no renewal)</li>
      </ul>
    </div>

    <div id="walletStatus" style="margin:20px 0; font-size:1.1em;"></div>

    <button id="payBtn" onclick="buyLicense()">💎 Pay 100 PLSC Now</button>

    <div id="result" style="display:none;"></div>
  </div>

  <script>
    const CONTRACT_ADDRESS = "0x4C86C5640ADEc6daDB88b75adEFE3C2FbC2d3510"; // ← CHANGE TO YOUR CURRENT PLSC ADDRESS
    const LICENSE_PRICE = 100 * 10 ** 18; // 100 PLSC

    let provider, signer, contract;

    const ABI = [
      "function buyLicense(string calldata deviceHardwareId) external",
      "event LicenseIssued(address indexed user, string deviceId, string licenseKey)"
    ];

    async function connectWallet() {
      if (!window.ethereum) return alert("Please install MetaMask or connect Ledger via MetaMask");
      provider = new ethers.BrowserProvider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      signer = await provider.getSigner();
      contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
      
      document.getElementById("walletStatus").innerHTML = `✅ Connected: ${await signer.getAddress().then(a => a.slice(0,6)+'...'+a.slice(-4))}`;
    }

    async function buyLicense() {
      const deviceId = prompt("Enter your Heltec MAC address (e.g. 90:70:69:83:E6:1C)\nYou can copy it from Device Manager page:");
      if (!deviceId) return;

      const payBtn = document.getElementById("payBtn");
      payBtn.innerHTML = "⏳ Sending transaction...";
      payBtn.disabled = true;

      try {
        const tx = await contract.buyLicense(deviceId);
        document.getElementById("result").innerHTML = `<div class="success"><strong>Transaction sent!</strong><br>Tx Hash: <a href="https://scan.pulsechain.com/tx/${tx.hash}" target="_blank">${tx.hash.slice(0,12)}...</a><br><br>Waiting for confirmation...</div>`;
        document.getElementById("result").style.display = "block";

        const receipt = await tx.wait();
        
        // Get the license key from the event
        const event = receipt.logs.find(log => log.topics[0] === ethers.id("LicenseIssued(address,string,string)"));
        let licenseKey = "PLSC-LICENSE-" + Date.now();
        if (event) {
          const decoded = ethers.AbiCoder.defaultAbiCoder().decode(["address","string","string"], event.data);
          licenseKey = decoded[2];
        }

        document.getElementById("result").innerHTML = `
          <div class="success">
            <strong style="color:#22c55e">✅ License Purchased Successfully!</strong><br><br>
            <strong>License Key:</strong><br>
            <code style="background:#1e2937;padding:8px;border-radius:6px;display:block;margin:12px 0;">${licenseKey}</code>
            <p>Your Heltec V4 is now fully licensed for lifetime use.</p>
            <button onclick="window.location.href='device-manager.html'" style="background:#22d3ee;color:#0a0c1f;padding:12px 24px;border-radius:8px;">Send License to Device →</button>
          </div>`;
      } catch (err) {
        alert("Transaction failed or cancelled: " + err.message);
        console.error(err);
      }

      payBtn.innerHTML = "💎 Pay 100 PLSC Now";
      payBtn.disabled = false;
    }

    // Auto connect wallet on load
    window.onload = connectWallet;

    // Mesh background (same as your other pages)
    const canvas = document.getElementById('mesh-bg');
    const ctx = canvas.getContext('2d');
    // ... (same mesh animation code as device-manager.html - omitted here for brevity but included in full version)
  </script>
</body>
</html>
