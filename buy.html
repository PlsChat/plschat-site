
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buy License - PLSChat</title>
  <style>
    body { font-family: 'Inter', Arial, sans-serif; background: #0d1117; color: #c9d1d9; text-align: center; padding: 40px; }
    .card { background: #161b22; border-radius: 16px; padding: 30px; max-width: 500px; margin: 20px auto; }
    button { padding: 16px 32px; font-size: 1.1em; margin: 10px; border: none; border-radius: 12px; cursor: pointer; }
    .btn-annual { background: #f0b429; color: black; }
    .btn-lifetime { background: #238636; color: white; }
  </style>
</head>
<body>
  <h1>Buy PLSChat License</h1>
  <p id="mac-display">Device MAC: Loading...</p>

  <div class="card">
    <h2>Annual License</h2>
    <h3>15 PLSC / year</h3>
    <button class="btn-annual" onclick="buy('annual')">Buy Annual License</button>
  </div>

  <div class="card">
    <h2>Lifetime License</h2>
    <h3>50 PLSC (one-time)</h3>
    <button class="btn-lifetime" onclick="buy('lifetime')">Buy Lifetime License</button>
  </div>

  <script>
    const mac = new URLSearchParams(window.location.search).get('mac');
    if (mac) document.getElementById('mac-display').textContent = `Device MAC: ${mac}`;

    async function buy(type) {
      const amount = type === 'annual' ? 15 : 50;
      alert(`Purchasing ${type} license (${amount} PLSC) for MAC: ${mac}\n\nMetaMask / ZKX wallet connection will be triggered here.`);
    }
  </script>
</body>
</html>
