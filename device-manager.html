<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat - Device Manager</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0c1f;
      color: #c9d1d9;
      margin: 0;
      padding: 40px 20px;
      min-height: 100vh;
      position: relative;
      overflow-y: auto;
    }
    
    #mesh-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: -1;
      opacity: 0.9;
    }
    
    .container {
      max-width: 960px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }
    
    h1 {
      font-size: 3.6em;
      font-weight: 700;
      background: linear-gradient(90deg, #a855f7, #67e8f9, #58a6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    
    .subtitle {
      color: #94a3b8;
      font-size: 1.3em;
      margin-bottom: 30px;
    }
    
    .top-nav {
      position: absolute;
      top: 20px;
      left: 20px;
    }
    
    .buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
      margin: 40px 0;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }
    
    button {
      padding: 18px 24px;
      font-size: 1.1em;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6, #a855f7);
      color: white;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
    }
    
    button::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -150%;
      width: 60%;
      height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      transition: 0.7s;
    }
    
    button:hover::before {
      left: 250%;
    }
    
    button:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 30px rgba(139, 92, 246, 0.6);
    }
    
    .success-box {
      background: rgba(34, 211, 238, 0.15);
      border: 2px solid #22d3ee;
      padding: 20px;
      border-radius: 16px;
      margin: 30px auto;
      color: #67e8f9;
      font-size: 1.5em;
      font-weight: 600;
      max-width: 500px;
    }
    
    .bottom-nav {
      margin-top: 40px;
    }

    .map-button {
      background: linear-gradient(135deg, #22c55e, #16a34a) !important;
      box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4) !important;
    }

    .map-button:hover {
      box-shadow: 0 15px 30px rgba(34, 197, 94, 0.6) !important;
    }
  </style>
</head>
<body>
  <canvas id="mesh-bg"></canvas>
  
  <div class="container">
    <!-- Top Left Back Button -->
    <div class="top-nav">
      <button onclick="window.location.href='index.html'" style="padding:10px 16px; font-size:1em; background:#334155;">Back to Home</button>
    </div>
    
    <h1>PULSE CHAT</h1>
    <p class="subtitle">Decentralised LoRa Mesh Communication</p>
 
    <div class="buttons">
      <button onclick="window.location.href='flasher.html'">Open Web Flasher</button>
      <button onclick="window.location.href='monitor.html'">Network Monitor</button>
      <!-- Replaced Connect Device with Coverage Map button -->
      <a href="coverage-map.html" style="text-decoration: none; width: 100%;">
        <button class="map-button" style="width: 100%;">
          <span>View Coverage Map</span>
        </button>
      </a>
      <button onclick="window.location.href='buy.html'">Buy License</button>
      <button onclick="claimRewards()">Claim Rewards</button>
      <button onclick="window.location.href='configure.html'">Configure Device</button>
    </div>
    
    <div id="output"></div>
   
    <!-- Bottom Centered Back Button -->
    <div class="bottom-nav">
      <button onclick="window.location.href='index.html'" style="padding:14px 32px; font-size:1.1em; background:#334155; color:#c9d1d9;">Back to Home</button>
    </div>
  </div>

  <script>
    // ==================== WORKING ANIMATED MESH BACKGROUND ====================
    const canvas = document.getElementById('mesh-bg');
    const ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    let nodes = [];
    const nodeCount = 55;

    function initNodes() {
      nodes = [];
      for (let i = 0; i < nodeCount; i++) {
        nodes.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          vx: (Math.random() - 0.5) * 0.7,
          vy: (Math.random() - 0.5) * 0.7,
          radius: 3.2
        });
      }
    }
    initNodes();

    let mouse = { x: 0, y: 0, active: false };

    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      mouse.active = true;
    });
    
    window.addEventListener('mouseleave', () => {
      mouse.active = false;
    });

    function drawMesh() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Draw connections
      ctx.strokeStyle = 'rgba(103, 232, 249, 0.12)';
      ctx.lineWidth = 1;
      
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const distance = Math.hypot(dx, dy);
          
          if (distance < 160) {
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.stroke();
          }
        }
      }
      
      // Draw nodes + mouse interaction
      nodes.forEach(node => {
        // Mouse repulsion
        if (mouse.active) {
          const dx = node.x - mouse.x;
          const dy = node.y - mouse.y;
          const dist = Math.hypot(dx, dy);
          
          if (dist < 220 && dist > 0) {
            const force = (220 - dist) / 220;
            node.vx += (dx / dist) * force * 0.8;
            node.vy += (dy / dist) * force * 0.8;
          }
        }
        
        // Update position
        node.x += node.vx;
        node.y += node.vy;
        
        // Bounce off edges
        const margin = 30;
        if (node.x < margin || node.x > canvas.width - margin) node.vx *= -1;
        if (node.y < margin || node.y > canvas.height - margin) node.vy *= -1;
        
        // Draw node
        ctx.beginPath();
        ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#67e8f9';
        ctx.fill();
      });
      
      requestAnimationFrame(drawMesh);
    }
    
    drawMesh();
    // ==================== END OF ANIMATION ====================

    // ==================== DEVICE MANAGER FUNCTIONS ====================
    function claimRewards() {
      window.location.href = 'claim.html';
    }

    // Note: connectDevice() function removed as the button was replaced with Coverage Map
  </script>
</body>
</html>
