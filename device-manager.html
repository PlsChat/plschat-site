<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat - Device Manager</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', Arial, sans-serif; background: linear-gradient(135deg, #0d1117 0%, #1a2332 100%); color: #c9d1d9; margin: 0; padding: 40px 20px; min-height: 100vh; }
    .container { max-width: 900px; margin: 0 auto; text-align: center; }
    h1 { color: #58a6ff; font-size: 2.8em; margin-bottom: 8px; }
    p { font-size: 1.1em; color: #8b949e; max-width: 600px; margin: 0 auto 40px; }
    .btn {
      padding: 16px 32px;
      font-size: 1.1em;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin: 8px;
      transition: all 0.3s;
    }
    .btn-connect { background: #238636; color: white; }
    .btn-buy { background: #f0b429; color: #0d1117; }
    .btn-claim { background: #22d3ee; color: #0d1117; }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
  </style>
</head>
<body>
  <div class="container">
    <h1>PLSChat Device Manager</h1>
    <p>Plug in your Heltec V4 to manage your license and rewards</p>

    <button class="btn btn-connect" onclick="connectDevice()">🔌 Connect Device</button>
    <button class="btn btn-buy" onclick="buyLicense()">💰 Buy License</button>
    <button class="btn btn-claim" onclick="claimRewards()">🏦 Claim Rewards</button>

    <div id="output" class="status" style="display:none; margin-top:40px; padding:25px; background:#161b22; border-radius:16px; text-align:left;"></div>
  </div>

  <script>
    let currentMAC = "";

    async function connectDevice() { /* ... same as before ... */ }

    function buyLicense() {
      if (!currentMAC) return alert("Please connect your device first!");
      window.open(`buy.html?mac=${currentMAC}`, '_blank');
    }

    function claimRewards() {
      if (!currentMAC) return alert("Please connect your device first!");
      window.open(`claim.html?mac=${currentMAC}`, '_blank');
    }
  </script>
</body>
</html>
