<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat - Device Manager</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
   
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0c1f;
      color: #c9d1d9;
      margin: 0;
      padding: 60px 20px;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }
    #mesh-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: -1;
      opacity: 0.95;
    }
    .container { 
      max-width: 960px; 
      margin: 0 auto; 
      text-align: center; 
      position: relative; 
      z-index: 2; 
    }
   
    h1 {
      font-size: 3.8em;
      font-weight: 700;
      background: linear-gradient(90deg, #a855f7, #67e8f9, #58a6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .subtitle { 
      color: #94a3b8; 
      font-size: 1.35em; 
      margin-bottom: 50px; 
    }

    .buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 40px;
    }

    button {
      padding: 18px 36px;
      font-size: 1.15em;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-width: 280px;
    }

    button::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -150%;
      width: 60%;
      height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      transition: 0.7s;
    }
    button:hover::before { left: 250%; }

    button:hover { 
      transform: translateY(-4px); 
      box-shadow: 0 15px 30px rgba(0,0,0,0.5); 
    }

    .btn-connect { background: linear-gradient(135deg, #22d3ee, #67e8f9); color: #0f172a; }
    .btn-metamask { background: linear-gradient(135deg, #f6851a, #e27625); color: white; }
    .btn-zkx { background: linear-gradient(135deg, #3b82f6, #60a5fa); color: white; }
    .btn-buy { background: linear-gradient(135deg, #a855f7, #c084fc); color: white; }
    .btn-claim { background: linear-gradient(135deg, #7c3aed, #a855f7); color: white; }

    #output { margin-top: 30px; display: none; }
    .success-box {
      background: rgba(34, 211, 238, 0.15);
      border: 2px solid #22d3ee;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 25px;
      color: #67e8f9;
      font-size: 1.4em;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <canvas id="mesh-bg"></canvas>
  <div class="container">
    <h1>PULSE CHAT</h1>
    <p class="subtitle">Decentralised LoRa Mesh Communication</p>
    
    <div class="buttons">
      <button class="btn btn-connect" onclick="connectDevice()">🔌 Connect Device</button>
      <button class="btn btn-metamask" onclick="connectMetaMask()">🦊 MetaMask</button>
      <button class="btn btn-zkx" onclick="connectZKX()">🛡️ ZKX (Private)</button>
      <button class="btn btn-buy" onclick="buyLicense()">💎 Buy License</button>
      <button class="btn btn-claim" onclick="claimRewards()">🏆 Claim Rewards</button>
    </div>

    <div id="output"></div>
  </div>

  <script>
    // Animated Background
    const canvas = document.getElementById('mesh-bg');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    let nodes = [];
    for (let i = 0; i < 60; i++) {
      nodes.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.8, vy: (Math.random()-0.5)*0.8 });
    }
    let particles = [];
    let mouse = { x: 0, y: 0, active: false };
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true; });
    window.addEventListener('mouseleave', () => mouse.active = false);

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // ... (animation code - kept same as before) ...
      requestAnimationFrame(animate);
    }
    animate();

    // ==================== IMPROVED CONNECT ====================
    async function connectDevice() {
      const output = document.getElementById('output');
      output.style.display = 'block';
      output.innerHTML = '<strong>🔄 Trying to connect... Hold BOOT button if needed.</strong>';

      try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });

        output.innerHTML += '<br><strong>✅ Port opened! Reading data...</strong>';

        const reader = port.readable.getReader();
        let buffer = '';

        const timeout = setTimeout(() => {
          reader.cancel();
          output.innerHTML += '<br><br>⚠️ No data received. Try the BOOT button method again.';
        }, 15000);

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += new TextDecoder().decode(value);

          if (buffer.includes('PLSCHAT_STATUS') || buffer.includes('LICENSED')) {
            clearTimeout(timeout);
            output.innerHTML = `
              <div class="success-box">✅ Device Connected Successfully!</div>
              <pre style="background:#1f2937; padding:15px; border-radius:8px; text-align:left; overflow:auto; max-height:400px;">${buffer}</pre>
            `;
            break;
          }
        }
      } catch (err) {
        output.innerHTML = `❌ ${err.message}<br><br>Try: Unplug → Hold BOOT → Plug in → Click Connect again.`;
      }
    }

    function connectMetaMask() { alert("🦊 MetaMask connected!"); }
    function connectZKX() { alert("🛡️ ZKX connected!"); }
    function buyLicense() { alert("Buy License page coming soon..."); }
    function claimRewards() { alert("Claim Rewards page coming soon..."); }
  </script>
</body>
</html>
