<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat - Device Manager</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0c1f;
      color: #c9d1d9;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      opacity: 0.85;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: clamp(2.2em, 8vw, 3.8em);
      background: linear-gradient(90deg, #a855f7, #67e8f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      margin: 20px 0 8px;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      font-size: 1.25em;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    button, .btn {
      padding: 18px 24px;
      font-size: 1.15em;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      width: 100%;
      max-width: 360px;
      transition: all 0.4s;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    /* Shimmer Effect */
    button::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -100%;
      width: 50%;
      height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      transition: 0.7s;
    }

    button:hover::before {
      left: 200%;
    }

    .btn-connect { background: linear-gradient(135deg, #22d3ee, #67e8f9); color: #0f172a; }
    .btn-metamask { background: linear-gradient(135deg, #f6851a, #e27625); color: white; }
    .btn-zkx { background: linear-gradient(135deg, #6b46c1, #a855f7); color: white; }
    .btn-buy { background: linear-gradient(135deg, #a855f7, #c084fc); color: white; }
    .btn-claim { background: linear-gradient(135deg, #3b82f6, #60a5fa); color: white; }

    button:hover {
      transform: scale(1.06);
      box-shadow: 0 15px 25px rgba(0,0,0,0.4);
    }

    .manual-input {
      background: rgba(30, 30, 50, 0.9);
      padding: 20px;
      border-radius: 12px;
      margin: 25px 0;
      text-align: center;
    }

    input {
      width: 100%;
      max-width: 340px;
      padding: 14px;
      font-size: 1.1em;
      background: #1f2937;
      color: white;
      border: none;
      border-radius: 8px;
      margin-bottom: 12px;
    }

    @media (min-width: 768px) {
      .buttons { flex-direction: row; flex-wrap: wrap; justify-content: center; }
      button, .btn { width: auto; min-width: 280px; }
    }
  </style>
</head>
<body>
  <canvas id="mesh-bg"></canvas>
  
  <div class="container">
    <h1>PULSE CHAT</h1>
    <p class="subtitle">Device Manager</p>

    <div class="buttons">
      <button class="btn btn-connect" onclick="connectDevice()">🔌 Connect Device<br><small>(Desktop only)</small></button>
      <button class="btn btn-metamask" onclick="connectWallet('metamask')">🦊 MetaMask</button>
      <button class="btn btn-zkx" onclick="connectWallet('zkx')">🛡️ ZKX</button>
      <button class="btn btn-buy" onclick="goToBuy()">💎 Buy License</button>
      <button class="btn btn-claim" onclick="goToClaim()">🏆 Claim Rewards</button>
    </div>

    <div class="manual-input">
      <strong>Mobile Users:</strong> Enter your device MAC address<br><br>
      <input type="text" id="mac-input" placeholder="90:70:69:83:E6:1C" maxlength="17">
      <button onclick="useManualMAC()" style="max-width:340px;">Continue with this MAC</button>
    </div>
  </div>

  <script>
    // Same slower animated background
    const canvas = document.getElementById('mesh-bg');
    const ctx = canvas.getContext('2d');
    let nodes = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    for (let i = 0; i < 55; i++) {
      nodes.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4
      });
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      nodes.forEach(node => {
        node.x += node.vx;
        node.y += node.vy;
        if (node.x < 0 || node.x > canvas.width) node.vx *= -1;
        if (node.y < 0 || node.y > canvas.height) node.vy *= -1;

        ctx.fillStyle = '#67e8f9';
        ctx.shadowBlur = 18;
        ctx.shadowColor = '#67e8f9';
        ctx.beginPath();
        ctx.arc(node.x, node.y, 3.8, 0, Math.PI * 2);
        ctx.fill();
      });
      requestAnimationFrame(animate);
    }
    animate();

    function connectDevice() { alert("🔌 Web Serial works best on Desktop Chrome/Edge."); }
    function useManualMAC() {
      const mac = document.getElementById('mac-input').value.trim();
      if (mac) alert("✅ MAC saved: " + mac);
      else alert("Please enter a MAC address");
    }
    function connectWallet(type) { alert(type.toUpperCase() + " wallet connection coming soon!"); }
    function goToBuy() { window.location.href = "buy.html"; }
    function goToClaim() { window.location.href = "claim.html"; }
  </script>
</body>
</html>
