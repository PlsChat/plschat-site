<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat - Device Manager</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
   
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0c1f;
      color: #c9d1d9;
      margin: 0;
      padding: 60px 20px;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }
    #mesh-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: -1;
      opacity: 0.95;
    }
    .container { 
      max-width: 960px; 
      margin: 0 auto; 
      text-align: center; 
      position: relative; 
      z-index: 2; 
    }
   
    h1 {
      font-size: 3.8em;
      font-weight: 700;
      background: linear-gradient(90deg, #a855f7, #67e8f9, #58a6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .subtitle { 
      color: #94a3b8; 
      font-size: 1.35em; 
      margin-bottom: 50px; 
    }

    .buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 40px;
    }

    button {
      padding: 18px 36px;
      font-size: 1.15em;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-width: 280px;
    }

    button::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -150%;
      width: 60%;
      height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      transition: 0.7s;
    }
    button:hover::before { left: 250%; }

    button:hover { 
      transform: translateY(-4px); 
      box-shadow: 0 15px 30px rgba(0,0,0,0.5); 
    }

    .btn-connect { background: linear-gradient(135deg, #22d3ee, #67e8f9); color: #0f172a; }
    .btn-metamask { background: linear-gradient(135deg, #f6851a, #e27625); color: white; }
    .btn-zkx { background: linear-gradient(135deg, #3b82f6, #60a5fa); color: white; }
    .btn-buy { background: linear-gradient(135deg, #a855f7, #c084fc); color: white; }
    .btn-claim { background: linear-gradient(135deg, #7c3aed, #a855f7); color: white; }

    #output { margin-top: 30px; display: none; }
    .success-box {
      background: rgba(34, 211, 238, 0.15);
      border: 2px solid #22d3ee;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 25px;
      color: #67e8f9;
      font-size: 1.5em;
      font-weight: 600;
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }
    .info-card {
      background: rgba(30, 30, 50, 0.95);
      padding: 18px;
      border-radius: 12px;
      border-left: 5px solid #67e8f9;
      text-align: left;
    }
    .info-card strong {
      color: #67e8f9;
      display: block;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <canvas id="mesh-bg"></canvas>
  <div class="container">
    <h1>PULSE CHAT</h1>
    <p class="subtitle">Decentralised LoRa Mesh Communication</p>
    
    <div class="buttons">
      <button class="btn btn-connect" onclick="connectDevice()">🔌 Connect Device</button>
      <button class="btn btn-metamask" onclick="connectMetaMask()">🦊 MetaMask</button>
      <button class="btn btn-zkx" onclick="connectZKX()">🛡️ ZKX (Private)</button>
      <button class="btn btn-buy" onclick="buyLicense()">💎 Buy License</button>
      <button class="btn btn-claim" onclick="claimRewards()">🏆 Claim Rewards</button>
    </div>

    <div id="output"></div>
  </div>

  <script>
    // === FULL ANIMATED BACKGROUND ===
    const canvas = document.getElementById('mesh-bg');
    const ctx = canvas.getContext('2d');
   
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    let nodes = [];
    for (let i = 0; i < 60; i++) {
      nodes.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: 3.8,
        vx: (Math.random() - 0.5) * 0.8,
        vy: (Math.random() - 0.5) * 0.8
      });
    }
    let particles = [];
    let mouse = { x: 0, y: 0, active: false };

    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      mouse.active = true;
    });
    window.addEventListener('mouseleave', () => mouse.active = false);

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      nodes.forEach(node => {
        if (mouse.active) {
          const dx = node.x - mouse.x;
          const dy = node.y - mouse.y;
          const dist = Math.hypot(dx, dy);
          if (dist < 280 && dist > 0) {
            const force = (280 - dist) / 280 * 0.8;
            node.vx += (dx / dist) * force;
            node.vy += (dy / dist) * force;
          }
        }
        node.x += node.vx;
        node.y += node.vy;

        const margin = 40;
        if (node.x < margin) { node.x = margin; node.vx = Math.abs(node.vx) * 0.9; }
        if (node.x > canvas.width - margin) { node.x = canvas.width - margin; node.vx = -Math.abs(node.vx) * 0.9; }
        if (node.y < margin) { node.y = margin; node.vy = Math.abs(node.vy) * 0.9; }
        if (node.y > canvas.height - margin) { node.y = canvas.height - margin; node.vy = -Math.abs(node.vy) * 0.9; }

        ctx.beginPath();
        ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#67e8f9';
        ctx.shadowBlur = 30;
        ctx.shadowColor = '#67e8f9';
        ctx.fill();
      });

      ctx.strokeStyle = '#c084fc';
      ctx.lineWidth = 1.8;
      nodes.forEach((node, i) => {
        nodes.forEach((other, j) => {
          if (i < j) {
            const dist = Math.hypot(node.x - other.x, node.y - other.y);
            if (dist < 240) {
              ctx.globalAlpha = (240 - dist) / 240 * 0.85;
              ctx.beginPath();
              ctx.moveTo(node.x, node.y);
              ctx.lineTo(other.x, other.y);
              ctx.stroke();

              if (Math.random() < 0.15) {
                particles.push({
                  x: node.x,
                  y: node.y,
                  tx: other.x,
                  ty: other.y,
                  progress: 0,
                  speed: 0.05 + Math.random() * 0.03
                });
              }
            }
          }
        });
      });

      ctx.fillStyle = '#67e8f9';
      ctx.shadowBlur = 22;
      ctx.shadowColor = '#67e8f9';
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.progress += p.speed;
        if (p.progress > 1) {
          particles.splice(i, 1);
          continue;
        }
        const x = p.x + (p.tx - p.x) * p.progress;
        const y = p.y + (p.ty - p.y) * p.progress;
        ctx.beginPath();
        ctx.arc(x, y, 3.8, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      requestAnimationFrame(animate);
    }
    animate();

    // ==================== CONNECT DEVICE - CLEAN CARDS ====================
    async function connectDevice() {
      const output = document.getElementById('output');
      output.style.display = 'block';
      output.innerHTML = '<strong>🔄 Connecting to device...</strong>';

      try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });

        const reader = port.readable.getReader();
        let buffer = '';

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          buffer += new TextDecoder().decode(value);

          // Very flexible detection
          if (buffer.includes('MAC:') || buffer.includes('LICENSED:')) {
            const mac = buffer.match(/MAC:([\w:]+)/) ? buffer.match(/MAC:([\w:]+)/)[1] : 'Unknown';
            const licensed = buffer.includes('LICENSED:YES') || buffer.includes('LICENSE VALID') ? '✅ Licensed' : '❌ Not Licensed';
            const claimable = buffer.match(/CLAIMABLE:([\d.]+)/) ? buffer.match(/CLAIMABLE:([\d.]+)/)[1] : '0';
            const uptime = buffer.match(/UPTIME_HOURS:([\d.]+)/) ? buffer.match(/UPTIME_HOURS:([\d.]+)/)[1] : '0';
            const rssi = buffer.match(/AVG_RSSI:(-?[\d.]+)/) ? buffer.match(/AVG_RSSI:(-?[\d.]+)/)[1] : '-';

            output.innerHTML = `
              <div class="success-box">✅ Device Connected Successfully!</div>
              <div class="info-grid">
                <div class="info-card"><strong>MAC Address</strong><br>${mac}</div>
                <div class="info-card"><strong>License Status</strong><br>${licensed}</div>
                <div class="info-card"><strong>Claimable Rewards</strong><br>${claimable} PLSC</div>
                <div class="info-card"><strong>Uptime</strong><br>${uptime} hours</div>
                <div class="info-card"><strong>Signal Strength</strong><br>${rssi} dBm</div>
              </div>
            `;
            break;
          }
        }
      } catch (err) {
        output.innerHTML = `❌ ${err.message}`;
      }
    }

    function connectMetaMask() { alert("🦊 MetaMask connected!"); }
    function connectZKX() { alert("🛡️ ZKX (Private) connected!"); }
    function buyLicense() { alert("💎 Buy License page coming soon..."); }
    function claimRewards() { alert("🏆 Claim Rewards page coming soon..."); }
  </script>
</body>
</html>
