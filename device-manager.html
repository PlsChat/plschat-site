<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat - Device Manager</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    
    body {
      font-family: 'Inter', Arial, sans-serif;
      background: linear-gradient(135deg, #0d1117 0%, #1a2332 100%);
      color: #c9d1d9;
      margin: 0;
      padding: 40px 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
    }
    h1 {
      color: #58a6ff;
      font-size: 2.8em;
      margin-bottom: 8px;
    }
    p {
      font-size: 1.1em;
      color: #8b949e;
      max-width: 600px;
      margin: 0 auto 40px;
    }
    .btn {
      padding: 16px 32px;
      font-size: 1.1em;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin: 10px;
      transition: all 0.3s;
    }
    .btn-connect { background: #238636; color: white; }
    .btn-buy { background: #f0b429; color: #0d1117; }
    .btn-claim { background: #22d3ee; color: #0d1117; }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

    .status {
      margin: 40px auto;
      padding: 25px;
      background: #161b22;
      border-radius: 16px;
      text-align: left;
      max-width: 700px;
      display: none;
      border: 1px solid #30363d;
    }
    .error {
      background: #3a1f1f;
      color: #f85149;
      padding: 20px;
      border-radius: 12px;
      margin: 20px auto;
      max-width: 700px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>PLSChat Device Manager</h1>
    <p>Plug in your Heltec V4 to manage your license and claim rewards</p>

    <button class="btn btn-connect" onclick="connectDevice()">🔌 Connect Device</button>
    <button class="btn btn-buy" onclick="buyLicense()">💰 Buy License</button>
    <button class="btn btn-claim" onclick="claimRewards()">🏦 Claim Rewards</button>

    <div id="output" class="status"></div>
  </div>

  <script>
    let currentMAC = "";

    async function connectDevice() {
      const output = document.getElementById('output');
      output.style.display = 'block';
      output.innerHTML = '<p>Connecting to device... Please make sure it is powered on.</p>';

      try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });

        const reader = port.readable.getReader();
        let buffer = '';

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += new TextDecoder().decode(value);

          if (buffer.includes('=== END_STATUS ===')) {
            const block = buffer.substring(
              buffer.lastIndexOf('=== PLSCHAT_STATUS ==='),
              buffer.lastIndexOf('=== END_STATUS ===') + 18
            );

            currentMAC = (block.match(/MAC:(.+)/) || [])[1] || "Unknown";

            output.innerHTML = `
              <h2>✅ Device Connected Successfully</h2>
              <pre style="background:#0d1117;padding:15px;border-radius:8px;overflow:auto;">${block}</pre>
              <p><strong>MAC Address:</strong> ${currentMAC}</p>
            `;
          }
        }
      } catch (err) {
        output.innerHTML = `<div class="error">
          <strong>Connection Failed</strong><br><br>
          ${err.message}<br><br>
          <strong>Troubleshooting:</strong><br>
          • Use Chrome or Edge browser<br>
          • Make sure you're on HTTPS (plschat.net)<br>
          • Device must be plugged in and powered on
        </div>`;
      }
    }

    function buyLicense() {
      if (!currentMAC) return alert("Please connect your device first!");
      window.open(`https://www.plschat.net/buy?mac=${currentMAC}`, '_blank');
    }

    function claimRewards() {
      if (!currentMAC) return alert("Please connect your device first!");
      window.open(`https://www.plschat.net/claim?mac=${currentMAC}`, '_blank');
    }
  </script>
</body>
</html>
