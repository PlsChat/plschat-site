<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat - Device Manager</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0c1f;
      color: #c9d1d9;
      margin: 0;
      padding: 40px 20px;
      min-height: 100vh;
      position: relative;
      overflow-y: auto;
    }
    #mesh-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: -1;
      opacity: 0.95;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }
    h1 {
      font-size: 3.6em;
      font-weight: 700;
      background: linear-gradient(90deg, #a855f7, #67e8f9, #58a6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 1.3em;
      margin-bottom: 30px;
    }
    .top-nav {
      position: absolute;
      top: 20px;
      left: 20px;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
      margin: 40px 0;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }
    button {
      padding: 18px 24px;
      font-size: 1.1em;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6, #a855f7);
      color: white;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
    }
    button::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -150%;
      width: 60%;
      height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      transition: 0.7s;
    }
    button:hover::before {
      left: 250%;
    }
    button:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 30px rgba(139, 92, 246, 0.6);
    }
    .success-box {
      background: rgba(34, 211, 238, 0.15);
      border: 2px solid #22d3ee;
      padding: 20px;
      border-radius: 16px;
      margin: 30px auto;
      color: #67e8f9;
      font-size: 1.5em;
      font-weight: 600;
      max-width: 500px;
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }
    .info-card {
      background: rgba(30, 30, 50, 0.95);
      padding: 18px;
      border-radius: 12px;
      border-left: 5px solid #67e8f9;
      text-align: left;
      position: relative;
    }
    .info-card strong {
      color: #67e8f9;
      display: block;
      margin-bottom: 6px;
    }
    .action-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 0.85em;
      padding: 4px 10px;
      background: #334155;
      color: #67e8f9;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .action-btn:hover {
      background: #22d3ee;
      color: #0f172a;
    }
    .bottom-nav {
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <canvas id="mesh-bg"></canvas>
  <div class="container">
    <!-- Top Left Back Button -->
    <div class="top-nav">
      <button onclick="window.location.href='index.html'" style="padding:10px 16px; font-size:1em; background:#334155;">Back to Home</button>
    </div>
    <h1>PULSE CHAT</h1>
    <p class="subtitle">Decentralised LoRa Mesh Communication</p>
 
    <div class="buttons">
      <button onclick="window.location.href='flasher.html'">Open Web Flasher</button>
      <button onclick="window.location.href='monitor.html'">Network Monitor</button>
      <button onclick="connectDevice()">Connect Device</button>
      <button onclick="window.location.href='buy.html'">Buy License</button>
      <button onclick="claimRewards()">Claim Rewards</button>
      <button onclick="window.location.href='configure.html'">Configure Device</button>
    </div>
    <div id="output"></div>
   
    <!-- Bottom Centered Back Button -->
    <div class="bottom-nav">
      <button onclick="window.location.href='index.html'" style="padding:14px 32px; font-size:1.1em; background:#334155; color:#c9d1d9;">Back to Home</button>
    </div>
  </div>

  <script>
    // === ANIMATED MESH BACKGROUND ===
    const canvas = document.getElementById('mesh-bg');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    let nodes = [];
    for (let i = 0; i < 60; i++) {
      nodes.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: 3.8,
        vx: (Math.random() - 0.5) * 0.8,
        vy: (Math.random() - 0.5) * 0.8
      });
    }

    let mouse = { x: 0, y: 0, active: false };
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true; });
    window.addEventListener('mouseleave', () => mouse.active = false);

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      nodes.forEach(node => {
        if (mouse.active) {
          const dx = node.x - mouse.x;
          const dy = node.y - mouse.y;
          const dist = Math.hypot(dx, dy);
          if (dist < 280 && dist > 0) {
            const force = (280 - dist) / 280 * 0.6;
            node.vx += (dx / dist) * force;
            node.vy += (dy / dist) * force;
          }
        }
        node.x += node.vx; node.y += node.vy;
        const margin = 40;
        if (node.x < margin || node.x > canvas.width - margin) node.vx *= -0.9;
        if (node.y < margin || node.y > canvas.height - margin) node.vy *= -0.9;
        ctx.beginPath();
        ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#67e8f9';
        ctx.fill();
      });
      requestAnimationFrame(animate);
    }
    animate();

    // === EXISTING DEVICE MANAGER FUNCTIONS ===
    function connectDevice() {
      const output = document.getElementById('output');
      output.innerHTML = `<div class="success-box">Device connected successfully!</div>`;
    }

    function claimRewards() {
      window.location.href = 'claim.html';
    }
  </script>
</body>
</html>
