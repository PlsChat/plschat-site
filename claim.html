<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claim Rewards - PLSChat</title>
  <style>
    body { font-family: 'Inter', Arial, sans-serif; background: #0d1117; color: #c9d1d9; text-align: center; padding: 40px; }
    .card { background: #161b22; border-radius: 16px; padding: 40px; max-width: 500px; margin: 30px auto; }
    button { padding: 18px 40px; font-size: 1.2em; background: #22d3ee; color: #0d1117; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Claim Rewards</h1>
  <p id="mac-display">Device MAC: Loading...</p>

  <div class="card">
    <h2>Available Rewards</h2>
    <h3 id="claimable">0.0000 PLSC</h3>
    <button onclick="claimNow()">Claim Now</button>
  </div>

  <script>
    const mac = new URLSearchParams(window.location.search).get('mac');
    if (mac) document.getElementById('mac-display').textContent = `Device MAC: ${mac}`;

    async function claimNow() {
      alert(`Claiming rewards for MAC: ${mac}\n\nMetaMask / ZKX connection + transaction will happen here.`);
    }
  </script>
</body>
</html>
