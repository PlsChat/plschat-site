<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claim Rewards - PLSChat</title>
  <style>
    body { font-family: 'Inter', Arial, sans-serif; background: #0d1117; color: #c9d1d9; text-align: center; padding: 40px; }
    .card { background: #161b22; border-radius: 16px; padding: 40px; max-width: 500px; margin: 30px auto; }
    button { padding: 16px 32px; font-size: 1.1em; margin: 10px; border: none; border-radius: 12px; cursor: pointer; }
    .btn-wallet { background: #6f42c1; color: white; }
  </style>
</head>
<body>
  <h1>Claim Your Rewards</h1>
  <p id="mac-display">Device MAC: Loading...</p>
  <p id="wallet-status" style="color:#8b949e;">No wallet connected</p>

  <div class="card">
    <h2>Available Rewards</h2>
    <h3 id="claimable">0.1284 PLSC</h3>
    <button class="btn-wallet" onclick="connectWallet()">Connect Wallet</button>
    <button onclick="claimNow()">Claim Rewards Now</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const mac = params.get('mac');
    if (mac) document.getElementById('mac-display').textContent = `Device MAC: ${mac}`;

    let connectedWallet = "";

    async function connectWallet() {
      if (typeof window.ethereum !== 'undefined') {
        try {
          const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
          connectedWallet = accounts[0];
          document.getElementById('wallet-status').innerHTML = `✅ Connected: ${connectedWallet.substring(0,8)}...`;
        } catch (e) { alert("Connection cancelled"); }
      } else {
        alert("Please install MetaMask or ZKX Wallet");
      }
    }

    async function claimNow() {
      if (!connectedWallet) {
        alert("Please connect your wallet first!");
        return;
      }
      alert(`Claiming rewards to wallet: ${connectedWallet}\n\nTransaction would be sent here.`);
    }
  </script>
</body>
</html>
