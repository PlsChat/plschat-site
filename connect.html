<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat - Device Connector</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0d1117; color: #c9d1d9; text-align: center; padding: 40px; }
    h1 { color: #58a6ff; }
    button { 
      padding: 14px 28px; 
      font-size: 1.1em; 
      margin: 8px; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer; 
    }
    .connect { background: #238636; color: white; }
    .buy { background: #f0b429; color: black; font-weight: bold; }
    .claim { background: #22d3ee; color: black; font-weight: bold; }
    .status { margin: 20px auto; padding: 20px; background: #161b22; border-radius: 8px; max-width: 700px; text-align: left; display: none; }
    .error { color: #f85149; background: #3a1f1f; padding: 15px; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>PLSChat Device Connector</h1>
  <p>Plug in your Heltec V4 and click below</p>
  
  <button class="connect" onclick="connectDevice()">🔌 Connect Device</button>
  <button class="buy" onclick="buyLicense()">💰 Buy License</button>
  <button class="claim" onclick="claimRewards()">🏦 Claim Rewards</button>

  <div id="output" class="status"></div>

  <script>
    let currentMAC = "";

    async function connectDevice() {
      const output = document.getElementById('output');
      output.style.display = 'block';
      output.innerHTML = '<p>Attempting to connect...</p>';

      try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });

        const reader = port.readable.getReader();
        let buffer = '';

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += new TextDecoder().decode(value);

          if (buffer.includes('=== END_STATUS ===')) {
            const block = buffer.substring(
              buffer.lastIndexOf('=== PLSCHAT_STATUS ==='),
              buffer.lastIndexOf('=== END_STATUS ===') + 18
            );

            currentMAC = (block.match(/MAC:(.+)/) || [])[1] || "Unknown";

            output.innerHTML = `
              <h2>✅ Device Connected</h2>
              <pre>${block}</pre>
              <p><strong>MAC:</strong> ${currentMAC}</p>
            `;
          }
        }
      } catch (err) {
        output.innerHTML = `
          <div class="error">
            <strong>Error:</strong> ${err.message}<br><br>
            <strong>Troubleshooting:</strong><br>
            • Must use <strong>HTTPS</strong> (not HTTP or raw GitHub preview)<br>
            • Try in <strong>Chrome or Edge</strong><br>
            • Click the button directly (not from an iframe if possible)<br>
            • Make sure the Heltec is plugged in and powered on
          </div>`;
      }
    }

    function buyLicense() {
      if (!currentMAC) return alert("Please connect your device first!");
      alert(`Buy License flow for MAC: ${currentMAC}\n\n(We'll connect this to the payment page next)`);
    }

    function claimRewards() {
      if (!currentMAC) return alert("Please connect your device first!");
      alert(`Claim Rewards for MAC: ${currentMAC}\n\n(We'll connect wallet + claim next)`);
    }
  </script>
</body>
</html>
