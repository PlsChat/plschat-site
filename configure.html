<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat - Configure Device</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0a0c1f; color: #c9d1d9; margin:0; padding:40px 20px; min-height:100vh; }
    .container { max-width:820px; margin:0 auto; text-align:center; }
    h1 { font-size:3.4em; background:linear-gradient(90deg,#67e8f9,#a855f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .subtitle { color:#94a3b8; font-size:1.35em; margin-bottom:40px; }
    .btn-back { position:absolute; top:25px; left:25px; padding:10px 22px; background:rgba(30,41,59,0.9); color:white; border:none; border-radius:9999px; cursor:pointer; }

    .status-box {
      background:rgba(15,23,42,0.95); padding:20px; border-radius:16px; margin:30px auto; max-width:700px;
    }
    .toggle-container {
      display:flex; justify-content:center; gap:40px; margin:40px 0;
    }
    .toggle {
      position:relative; display:inline-block; width:280px; height:80px;
    }
    .toggle input { opacity:0; width:0; height:0; }
    .slider {
      position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0;
      background:#334155; border-radius:40px; transition:.4s;
    }
    .slider:before {
      position:absolute; content:""; height:64px; width:120px; left:8px; bottom:8px;
      background:white; border-radius:35px; transition:.4s;
    }
    input:checked + .slider { background:#22c55e; }
    input:checked + .slider:before { transform:translateX(140px); }
    .toggle-label {
      position:absolute; top:50%; transform:translateY(-50%); font-size:1.3em; font-weight:600; width:100%; text-align:center; pointer-events:none;
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="btn-back" onclick="window.location.href='device-manager.html'">← Back to Device Manager</button>
    <h1>Configure Device</h1>
    <p class="subtitle">Current Mode • Toggle BLE / WiFi</p>

    <div class="status-box" id="statusBox">
      <strong>Connecting to device...</strong>
    </div>

    <div class="toggle-container">
      <label class="toggle">
        <input type="checkbox" id="bleToggle" onchange="toggleMode()">
        <span class="slider"><span class="toggle-label">Bluetooth (Low Power)</span></span>
      </label>

      <label class="toggle">
        <input type="checkbox" id="wifiToggle" onchange="toggleMode()">
        <span class="slider"><span class="toggle-label">WiFi Hotspot</span></span>
      </label>
    </div>
  </div>

  <script>
    let currentMode = "BLE";

    async function connectAndReadStatus() {
      const box = document.getElementById("statusBox");
      try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        const reader = port.readable.getReader();
        let buffer = "";

        const timeout = setTimeout(() => reader.cancel(), 12000);

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += new TextDecoder().decode(value);

          const modeMatch = buffer.match(/MODE:(\w+)/i);
          if (modeMatch) {
            clearTimeout(timeout);
            reader.cancel();
            currentMode = modeMatch[1].toUpperCase();

            document.getElementById("bleToggle").checked = currentMode === "BLE";
            document.getElementById("wifiToggle").checked = currentMode === "WIFI";

            box.innerHTML = `
              <strong>✅ Device Connected</strong><br><br>
              Current Mode: <strong>${currentMode}</strong>
            `;
            break;
          }
        }
      } catch (e) {
        box.innerHTML = "❌ Could not connect to device.<br>Hold BOOT button and try again.";
      }
    }

    async function toggleMode() {
      const isWifi = document.getElementById("wifiToggle").checked;
      const newMode = isWifi ? "WIFI" : "BLE";

      try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        const writer = port.writable.getWriter();
        await writer.write(new TextEncoder().encode(`MODE:${newMode}\n`));
        writer.releaseLock();

        alert(`✅ Switched to ${newMode} Mode`);
        currentMode = newMode;
      } catch (err) {
        alert("Failed to send command. Make sure device is connected.");
      }
    }

    // Auto connect when page loads
    window.onload = connectAndReadStatus;
  </script>
</body>
</html>
