<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat - Configure Device</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0c1f;
      color: #c9d1d9;
      margin: 0;
      padding: 40px 20px;
      min-height: 100vh;
      position: relative;
      overflow-y: auto;
    }
    #mesh-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: -1;
      opacity: 0.95;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }
    h1 {
      font-size: 3.4em;
      font-weight: 700;
      background: linear-gradient(90deg, #a855f7, #67e8f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 1.35em;
      margin-bottom: 40px;
    }
    button {
      padding: 18px 36px;
      font-size: 1.15em;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.4s;
      margin: 10px;
      min-width: 260px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6, #a855f7);
      color: white;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
    }
    button::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -150%;
      width: 60%;
      height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      transition: 0.7s;
    }
    button:hover::before { left: 250%; }
    button:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(139, 92, 246, 0.6);
    }
    .btn-back { background: #334155; color: white; }
    .config-panel {
      background: rgba(30, 30, 50, 0.95);
      padding: 25px;
      border-radius: 16px;
      margin-top: 30px;
      text-align: left;
      border-left: 6px solid #67e8f9;
    }
  </style>
</head>
<body>
  <canvas id="mesh-bg"></canvas>
  
  <div class="container">
    <h1>Configure Device</h1>
    <p class="subtitle">Change operating mode • Secure Connection Info</p>

    <button class="btn-back" onclick="window.location.href='device-manager.html'">← Back to Device Manager</button>

    <div style="margin: 40px 0;">
      <button onclick="selectMode('BLE')">📡 Switch to BLE Mode (Low Power)</button>
      <button onclick="selectMode('WIFI')">📶 Switch to WiFi Hotspot</button>
    </div>

    <div id="configPanel" class="config-panel" style="display:none;">
      <!-- Dynamic content will appear here -->
    </div>
  </div>

  <script>
    // ==================== FULL ANIMATED MESH BACKGROUND ====================
    const canvas = document.getElementById('mesh-bg');
    const ctx = canvas.getContext('2d');
  
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    let nodes = [];
    for (let i = 0; i < 65; i++) {
      nodes.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: 3.8,
        vx: (Math.random() - 0.5) * 0.8,
        vy: (Math.random() - 0.5) * 0.8
      });
    }
    let particles = [];
    let mouse = { x: 0, y: 0, active: false };

    window.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      mouse.active = true;
    });
    window.addEventListener('mouseleave', () => mouse.active = false);

    function animate() {
      ctx.fillStyle = 'rgba(10, 12, 31, 0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#67e8f9';
      ctx.shadowBlur = 30;
      ctx.shadowColor = '#67e8f9';
      nodes.forEach(node => {
        if (mouse.active) {
          const dx = node.x - mouse.x;
          const dy = node.y - mouse.y;
          const dist = Math.hypot(dx, dy);
          if (dist < 280 && dist > 0) {
            const force = (280 - dist) / 280 * 0.6;
            node.vx += (dx / dist) * force;
            node.vy += (dy / dist) * force;
          }
        }
        node.x += node.vx;
        node.y += node.vy;
        const margin = 40;
        if (node.x < margin || node.x > canvas.width - margin) node.vx *= -0.9;
        if (node.y < margin || node.y > canvas.height - margin) node.vy *= -0.9;

        ctx.beginPath();
        ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.strokeStyle = '#c084fc';
      ctx.lineWidth = 1.8;
      nodes.forEach((node, i) => {
        nodes.forEach((other, j) => {
          if (i < j) {
            const dist = Math.hypot(node.x - other.x, node.y - other.y);
            if (dist < 240) {
              ctx.globalAlpha = (240 - dist) / 240 * 0.85;
              ctx.beginPath();
              ctx.moveTo(node.x, node.y);
              ctx.lineTo(other.x, other.y);
              ctx.stroke();
              if (Math.random() < 0.15) {
                particles.push({
                  x: node.x,
                  y: node.y,
                  tx: other.x,
                  ty: other.y,
                  progress: 0,
                  speed: 0.05 + Math.random() * 0.03
                });
              }
            }
          }
        });
      });

      ctx.fillStyle = '#67e8f9';
      ctx.shadowBlur = 22;
      ctx.shadowColor = '#67e8f9';
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.progress += p.speed;
        if (p.progress > 1) {
          particles.splice(i, 1);
          continue;
        }
        const x = p.x + (p.tx - p.x) * p.progress;
        const y = p.y + (p.ty - p.y) * p.progress;
        ctx.beginPath();
        ctx.arc(x, y, 3.8, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      requestAnimationFrame(animate);
    }
    animate();

    // ==================== MODE SELECTION ====================
    function selectMode(mode) {
      const panel = document.getElementById('configPanel');
      panel.style.display = 'block';

      if (mode === 'BLE') {
        panel.innerHTML = `
          <h2 style="color:#67e8f9; margin-top:0;">📡 BLE Mode (Recommended)</h2>
          <p><strong>Low Power • Ideal for solar/battery devices</strong></p>
          <p>1. Turn on Bluetooth on your phone<br>
             2. Scan for "PLSChat-Repeater"<br>
             3. Pair using the numeric code shown on the device OLED (future app feature)</p>
          <p style="color:#94a3b8; font-size:0.95em;">Secure pairing code will be displayed on the OLED screen.</p>
        `;
      } else if (mode === 'WIFI') {
        panel.innerHTML = `
          <h2 style="color:#facc15; margin-top:0;">📶 WiFi Hotspot Mode</h2>
          <p><strong>High Power • USB-C recommended</strong></p>
          <p><strong>SSID:</strong> PLSChat-Repeater<br>
             <strong>Password:</strong> pls12345</p>
          <p>1. Connect your phone to the WiFi network above<br>
             2. Open the PLSChat mobile app (coming soon)</p>
          <p style="color:#94a3b8; font-size:0.95em;">Warning: WiFi uses significantly more power than BLE.</p>
        `;
      }
    }
  </script>
</body>
</html>
