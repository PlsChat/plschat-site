<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat - Configure Device</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0c1f;
      color: #c9d1d9;
      margin: 0;
      padding: 40px 20px;
      min-height: 100vh;
      position: relative;
      overflow-y: auto;
    }
    #mesh-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: -1;
      opacity: 0.95;
    }
    .container {
      max-width: 820px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }
    h1 {
      font-size: 3.4em;
      font-weight: 700;
      background: linear-gradient(90deg, #a855f7, #67e8f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .subtitle { color: #94a3b8; font-size: 1.35em; margin-bottom: 30px; }
    
    .btn-back {
      position: absolute;
      top: 25px;
      left: 25px;
      padding: 10px 24px;
      background: linear-gradient(135deg, #a855f7, #3b82f6);
      color: white;
      border: none;
      border-radius: 9999px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
    }
    
    .buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
      margin: 40px 0;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }
    button {
      padding: 18px 24px;
      font-size: 1.1em;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-connect { background: linear-gradient(135deg, #22d3ee, #67e8f9); color: #0f172a; }
    .btn-apply { background: linear-gradient(135deg, #a855f7, #3b82f6); color: white; }
    
    .toggle-group {
      background: #1e2937;
      padding: 20px;
      border-radius: 16px;
      margin: 20px 0;
      text-align: left;
    }
    .toggle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 15px 0;
      font-size: 1.1em;
    }
    input[type="checkbox"] {
      width: 52px;
      height: 28px;
      appearance: none;
      background: #334155;
      border-radius: 9999px;
      position: relative;
      cursor: pointer;
    }
    input[type="checkbox"]:checked { background: #22d3ee; }
    input[type="checkbox"]::before {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: 0.3s;
    }
    input[type="checkbox"]:checked::before { left: 27px; }
    
    .status-box {
      background: #1e2937;
      padding: 20px;
      border-radius: 12px;
      margin: 30px 0;
      min-height: 120px;
      text-align: left;
      font-family: monospace;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="btn-back" onclick="window.location.href='device-manager.html'">← Back</button>
    
    <h1>Configure Device</h1>
    <p class="subtitle">Change WiFi / Bluetooth settings on your Heltec V4</p>

    <button class="btn-connect" onclick="connectDevice()">🔌 Connect Device</button>

    <div id="statusBox" class="status-box">Click Connect Device above (hold BOOT button on the Heltec while connecting)</div>

    <div class="toggle-group">
      <div class="toggle">
        <span>Bluetooth (BLE)</span>
        <input type="checkbox" id="bleToggle" checked onchange="toggleMode()">
      </div>
      <div class="toggle">
        <span>WiFi Hotspot</span>
        <input type="checkbox" id="wifiToggle" onchange="toggleMode()">
      </div>
    </div>

    <div id="wifiSettings" style="display:none;">
      <label>WiFi SSID (Network Name)</label>
      <input type="text" id="ssid" value="PLSChat-Repeater" style="width:100%; padding:10px; margin:8px 0; background:#1e2937; border:none; border-radius:8px; color:white;">
      <label>WiFi Password</label>
      <input type="text" id="wifiPass" value="pls12345" style="width:100%; padding:10px; margin:8px 0; background:#1e2937; border:none; border-radius:8px; color:white;">
    </div>

    <button class="btn-apply" onclick="applyChanges()">💾 Apply Changes & Send to Device</button>
  </div>

  <canvas id="mesh-bg"></canvas>

  <script>
    // Mesh background animation (same as other pages)
    const canvas = document.getElementById('mesh-bg');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    let nodes = [];
    for(let i=0; i<72; i++) nodes.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, vx:(Math.random()-0.5)*0.8, vy:(Math.random()-0.5)*0.8});
    function animate() {
      ctx.fillStyle = 'rgba(10,12,31,0.18)';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      // (mesh animation code - kept short for clarity)
      requestAnimationFrame(animate);
    }
    animate();

    let port;
    async function connectDevice() {
      const box = document.getElementById("statusBox");
      box.innerHTML = "🔄 Connecting...<br><strong>Hold the BOOT button on the Heltec now!</strong>";
      try {
        port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        box.innerHTML = "✅ Device Connected!<br>Reading current settings...";
        // Read current mode etc. (can be expanded later)
      } catch (err) {
        box.innerHTML = `❌ Could not connect.<br>Hold BOOT button and <button onclick="connectDevice()">Retry</button>`;
      }
    }

    function toggleMode() {
      const wifiDiv = document.getElementById("wifiSettings");
      wifiDiv.style.display = document.getElementById("wifiToggle").checked ? "block" : "none";
    }

    async function applyChanges() {
      const box = document.getElementById("statusBox");
      const wifiEnabled = document.getElementById("wifiToggle").checked;
      const pass = document.getElementById("wifiPass").value.trim();
      
      box.innerHTML += "\n→ Sending settings to device...";
      try {
        const writer = port.writable.getWriter();
        if (wifiEnabled) {
          await writer.write(new TextEncoder().encode(`WIFI PASS:${pass}\n`));
        } else {
          await writer.write(new TextEncoder().encode("MODE:BLE\n"));
        }
        writer.releaseLock();
        box.innerHTML += "\n✅ Settings applied successfully!";
      } catch (e) {
        box.innerHTML += "\n❌ Failed to send. Re-connect device.";
      }
    }
  </script>
</body>
</html>
