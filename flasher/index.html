<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat Web Flasher</title>
  <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 40px; background: #0f172a; color: #e2e8f0; }
    h1 { color: #22d3ee; }
    .container { max-width: 800px; margin: 0 auto; }
    esp-web-install-button { margin: 30px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>PLSChat Web Flasher</h1>
    <p>Flash firmware to your Heltec V4 or other ESP32 LoRa boards directly from your browser.</p>

    <esp-web-install-button
      manifest="manifest.json">
    </esp-web-install-button>

    <p><strong>Instructions:</strong> Hold the <strong>BOOT button</strong> while clicking <strong>Connect</strong>.</p>
  </div>
</body>
</html>
