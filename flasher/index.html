<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Favicons -->
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0a0c1f">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat Web Flasher</title>
  <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      text-align: center; 
      padding: 40px; 
      background: #0f172a; 
      color: #e2e8f0; 
    }
    h1 { color: #22d3ee; margin-bottom: 10px; }
    p { max-width: 600px; margin: 20px auto; }
    .container { max-width: 800px; margin: 0 auto; }
    esp-web-install-button { margin: 30px auto; display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>PLSChat Web Flasher</h1>
    <p>Flash firmware directly to your Heltec V4 or other ESP32 LoRa boards from your browser.<br>
       <strong>No software install needed.</strong></p>

    <esp-web-install-button
      manifest="manifest.json">
    </esp-web-install-button>

    <p><strong>Important:</strong> Hold the <strong>BOOT button</strong> (small button next to USB-C) while clicking <strong>Connect</strong>.</p>
  </div>
</body>
</html>
