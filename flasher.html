<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat - Web Flasher</title>
  <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { 
      font-family: 'Inter', sans-serif; 
      background: #0a0c1f; 
      color: #c9d1d9; 
      margin:0; 
      padding:40px 20px; 
      text-align:center; 
      min-height:100vh; 
    }
    .container { max-width: 820px; margin: 0 auto; }
    h1 { 
      font-size: 3em; 
      background: linear-gradient(90deg, #a855f7, #67e8f9); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
    }
    button { 
      padding: 14px 28px; 
      font-size: 1.1em; 
      margin: 10px; 
      border: none; 
      border-radius: 12px; 
      cursor: pointer; 
      font-weight: 600; 
      background: linear-gradient(135deg, #3b82f6, #60a5fa); 
      color: white; 
    }
    .btn-send { 
      background: linear-gradient(135deg, #22c55e, #4ade80); 
      color: #000; 
    }
    .license-box { 
      background: rgba(34,197,94,0.15); 
      border: 2px solid #22c55e; 
      padding: 25px; 
      border-radius: 16px; 
      margin: 30px auto; 
      max-width: 600px; 
      text-align: left; 
      display: none;
    }
    .key { 
      font-family: monospace; 
      background:#111; 
      padding:14px; 
      border-radius:8px; 
      word-break:break-all; 
      margin:12px 0; 
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>PLSChat Web Flasher</h1>
    <p>Flash firmware + apply your purchased licence</p>

    <button onclick="document.querySelector('esp-web-install-button').click()">🔌 Flash Device</button>
    <button onclick="detectAndLoadLicense()">🔄 Refresh / Detect Licence</button>

    <div class="license-box" id="licenseBox">
      <h3>✅ Licence Found for this Device</h3>
      <div id="licenseDisplay" class="key"></div>
      <button class="btn-send" onclick="sendLicenseToDevice()">📤 Send Licence to Device</button>
      <button onclick="copyLicense()">📋 Copy Key</button>
    </div>

    <div style="background:rgba(30,30,50,0.8); padding:20px; border-radius:12px; max-width:600px; margin:30px auto; text-align:left;">
      <strong>Instructions:</strong><br><br>
      1. Hold BOOT button while plugging in<br>
      2. Click "<strong>Flash Device</strong>" to flash firmware<br>
      3. Click "<strong>Refresh / Detect Licence</strong>"<br>
      4. Click "<strong>Send Licence to Device</strong>"
    </div>
  </div>

  <script>
    let currentMAC = "";
    let currentLicenseKey = "";

    async function detectAndLoadLicense() {
      const box = document.getElementById("licenseBox");
      box.style.display = 'none';

      try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        const reader = port.readable.getReader();
        let buffer = "";

        const timeout = setTimeout(() => reader.cancel(), 15000);

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += new TextDecoder().decode(value);

          const macMatch = buffer.match(/MAC:([0-9A-F:]+)/i);
          if (macMatch) {
            clearTimeout(timeout);
            reader.cancel();
            currentMAC = macMatch[1];

            const licenses = JSON.parse(localStorage.getItem('licenses') || '{}');
            currentLicenseKey = licenses[currentMAC];

            const display = document.getElementById("licenseDisplay");
            if (currentLicenseKey) {
              display.innerHTML = `<strong>MAC:</strong> ${currentMAC}<br><strong>Key:</strong> ${currentLicenseKey}`;
              box.style.display = 'block';
            } else {
              display.innerHTML = `<strong>MAC:</strong> ${currentMAC}<br><span style="color:#f87171;">No licence found for this MAC.</span>`;
              box.style.display = 'block';
            }
            break;
          }
        }
      } catch (e) {
        alert("Could not detect device.\nHold BOOT button and try again.");
      }
    }

    async function sendLicenseToDevice() {
      if (!currentLicenseKey) return alert("No licence found.");

      try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        const writer = port.writable.getWriter();
        await writer.write(new TextEncoder().encode(`LICENSE:${currentLicenseKey}\n`));
        writer.releaseLock();
        alert("✅ Licence successfully sent to device!");
      } catch (err) {
        alert("Failed to send licence.\n\nMake sure:\n• Device is plugged in\n• Hold BOOT button if needed\n• Try clicking 'Refresh / Detect Licence' first");
      }
    }

    function copyLicense() {
      if (currentLicenseKey) {
        navigator.clipboard.writeText(currentLicenseKey);
        alert("Copied to clipboard!");
      }
    }
  </script>
</body>
</html>
