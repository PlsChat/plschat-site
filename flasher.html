<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat - Web Flasher</title>
  <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0a0c1f; color: #c9d1d9; margin:0; padding:40px 20px; text-align:center; min-height:100vh; }
    button { padding:14px 28px; font-size:1.1em; margin:10px; border:none; border-radius:12px; cursor:pointer; font-weight:600; background: linear-gradient(135deg, #3b82f6, #60a5fa); color:white; }
    .btn-send { background: linear-gradient(135deg, #22c55e, #4ade80); color:#000; }
  </style>
</head>
<body>
  <div style="max-width:820px; margin:0 auto; text-align:center;">
    <h1>PLSChat Web Flasher</h1>
    <p>Flash firmware + apply your purchased licence</p>

    <button onclick="flashDevice()">🔌 Flash Device</button>
    <button onclick="detectAndLoadLicense()">🔄 Refresh / Detect Licence</button>

    <div id="licenseBox" style="display:none; margin-top:30px; background:rgba(34,197,94,0.15); border:2px solid #22c55e; padding:25px; border-radius:16px;">
      <h3>✅ Licence Found</h3>
      <div id="licenseDisplay" style="font-family:monospace; background:#111; padding:14px; border-radius:8px; margin:15px 0;"></div>
      <button class="btn-send" onclick="sendLicenseToDevice()">📤 Send Licence to Device</button>
    </div>
  </div>

  <script>
    async function flashDevice() {
      try {
        const button = document.querySelector('esp-web-install-button');
        if (button) button.click();
        else alert("Flash button not ready. Refresh page.");
      } catch(e) {
        alert("Flash failed. Check manifest.json");
      }
    }

    // ... (rest of detect and send functions same as before)
    let currentMAC = "";
    let currentLicenseKey = "";

    async function detectAndLoadLicense() {
      try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        const reader = port.readable.getReader();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += new TextDecoder().decode(value);

          const macMatch = buffer.match(/MAC:([0-9A-F:]+)/i);
          if (macMatch) {
            reader.cancel();
            currentMAC = macMatch[1];
            const licenses = JSON.parse(localStorage.getItem('licenses') || '{}');
            currentLicenseKey = licenses[currentMAC];

            document.getElementById("licenseDisplay").innerHTML = `<strong>MAC:</strong> ${currentMAC}<br><strong>Key:</strong> ${currentLicenseKey || 'Not found'}`;
            document.getElementById("licenseBox").style.display = 'block';
            break;
          }
        }
      } catch (e) {
        alert("Could not detect device.");
      }
    }

    async function sendLicenseToDevice() {
      if (!currentLicenseKey) return alert("No licence found.");
      try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        const writer = port.writable.getWriter();
        await writer.write(new TextEncoder().encode(`LICENSE:${currentLicenseKey}\n`));
        writer.releaseLock();
        alert("✅ Licence sent successfully!");
      } catch (err) {
        alert("Failed to send. Device must be plugged in.");
      }
    }
  </script>
</body>
</html>
