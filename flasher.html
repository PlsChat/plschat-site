<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat Web Flasher - Preview</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 40px 20px;
      text-align: center;
    }
    .container { max-width: 700px; margin: 0 auto; }
    h1 { font-size: 2.2rem; margin-bottom: 8px; }
    .title { background: linear-gradient(90deg, #7c3aed, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: #94a3b8; margin-bottom: 40px; }
    
    .card {
      background: #1e2937;
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
      border: 1px solid #334155;
    }
    .card h2 { margin-top: 0; color: #f1f5f9; }
    
    .warning { color: #f87171; font-size: 0.95rem; margin: 16px 0; }
    
    button {
      background: #7c3aed;
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 1rem;
      border-radius: 9999px;
      cursor: pointer;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    button:hover { background: #6d28d9; }
    
    .back-btn {
      position: absolute;
      top: 30px;
      left: 30px;
      background: #7c3aed;
      padding: 10px 20px;
      border-radius: 9999px;
      font-size: 0.95rem;
    }
    
    /* Success Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.85);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: #1e2937;
      padding: 40px 50px;
      border-radius: 20px;
      text-align: center;
      max-width: 420px;
      border: 1px solid #475569;
    }
    .success-icon {
      font-size: 60px;
      margin-bottom: 20px;
    }
    .modal h2 { margin: 0 0 12px 0; font-size: 1.6rem; }
    .modal p { color: #94a3b8; margin-bottom: 30px; }
  </style>
</head>
<body>
  <button class="back-btn">← Back</button>

  <div class="container">
    <h1 class="title">PLSChat Web Flasher</h1>
    <p class="subtitle">Flash PLSChat v2.42 firmware to your Heltec V4</p>

    <!-- Flash Firmware Card -->
    <div class="card">
      <h2>Flash Firmware</h2>
      <p class="warning">Important: You must erase the device first before flashing new firmware.</p>
      
      <button onclick="simulateFlash()">⚡ Connect &amp; Flash</button>
    </div>

    <!-- Licence Section -->
    <div class="card">
      <h2>Send Licence (Optional)</h2>
      <button>🔑 Connect Device</button>
    </div>
  </div>

  <!-- Success Modal -->
  <div id="successModal" class="modal">
    <div class="modal-content">
      <div class="success-icon">🎉</div>
      <h2>Installation Complete!</h2>
      <p>Firmware v2.42 has been successfully flashed to your device.</p>
      
      <button onclick="closeModal()" style="width: 100%;">Finish</button>
    </div>
  </div>

  <script>
    function simulateFlash() {
      // In real version this will be the actual flashing
      setTimeout(() => {
        document.getElementById('successModal').style.display = 'flex';
      }, 800);
    }
    
    function closeModal() {
      document.getElementById('successModal').style.display = 'none';
      alert('Modal closed! (In real version it will just close cleanly)');
    }
    
    // Close modal when clicking outside
    document.getElementById('successModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeModal();
      }
    });
  </script>
</body>
</html>
