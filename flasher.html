<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat - Web Flasher</title>
  <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0a0c1f; color: #c9d1d9; margin:0; padding:40px 20px; text-align:center; min-height:100vh; }
    .container { max-width: 820px; margin: 0 auto; }
    h1 { font-size: 3em; background: linear-gradient(90deg, #a855f7, #67e8f9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p { font-size: 1.2em; color: #94a3b8; }
    
    .license-box { 
      background: rgba(34,197,94,0.15); 
      border: 2px solid #22c55e; 
      padding: 25px; 
      border-radius: 16px; 
      margin: 30px auto; 
      max-width: 600px; 
      text-align: left; 
      display: none;
    }
    .key { font-family: monospace; background:#111; padding:14px; border-radius:8px; word-break:break-all; margin:12px 0; font-size:1.05em; }
    button { padding:16px 32px; font-size:1.1em; margin:10px; border:none; border-radius:12px; cursor:pointer; font-weight:600; }
    .btn-send { background:#22c55e; color:#000; }
  </style>
</head>
<body>
  <div class="container">
    <h1>PLSChat Web Flasher</h1>
    <p>Flash firmware + apply your purchased licence</p>

    <esp-web-install-button manifest="manifest.json"></esp-web-install-button>

    <!-- Licence Box -->
    <div class="license-box" id="licenseBox">
      <h3>✅ Licence Found for this Device</h3>
      <div id="licenseDisplay" class="key"></div>
      <button class="btn-send" onclick="sendLicenseToDevice()">📤 Send Licence to Device</button>
      <button onclick="copyLicense()">📋 Copy Key</button>
    </div>

    <div style="background:rgba(30,30,50,0.8); padding:20px; border-radius:12px; max-width:600px; margin:30px auto; text-align:left;">
      <strong>How to Flash + Activate Licence:</strong><br><br>
      1. Hold BOOT button while plugging in device<br>
      2. Click "Connect / Install" to flash firmware<br>
      3. After flashing, click <strong>Send Licence to Device</strong>
    </div>
  </div>

  <script>
    let currentMAC = "";
    let currentLicenseKey = "";

    async function detectAndLoadLicense() {
      try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        const reader = port.readable.getReader();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += new TextDecoder().decode(value);

          const macMatch = buffer.match(/MAC:([0-9A-F:]+)/i);
          if (macMatch) {
            currentMAC = macMatch[1];
            reader.cancel();

            const licenses = JSON.parse(localStorage.getItem('licenses') || '{}');
            currentLicenseKey = licenses[currentMAC];

            const box = document.getElementById("licenseBox");
            const display = document.getElementById("licenseDisplay");

            if (currentLicenseKey) {
              display.innerHTML = `<strong>MAC:</strong> ${currentMAC}<br><strong>Key:</strong> ${currentLicenseKey}`;
              box.style.display = 'block';
            }
            break;
          }
        }
      } catch (e) {}
    }

    async function sendLicenseToDevice() {
      if (!currentLicenseKey) return alert("No licence found.");
      
      try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        const writer = port.writable.getWriter();
        await writer.write(new TextEncoder().encode(`LICENSE:${currentLicenseKey}\n`));
        writer.releaseLock();
        alert("✅ Licence sent to device!");
      } catch (err) {
        alert("Failed to send. Make sure device is connected.");
      }
    }

    function copyLicense() {
      if (currentLicenseKey) {
        navigator.clipboard.writeText(currentLicenseKey);
        alert("Copied to clipboard!");
      }
    }

    window.onload = () => setTimeout(detectAndLoadLicense, 1200);
  </script>
</body>
</html>
