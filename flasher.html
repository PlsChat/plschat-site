<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat - Web Flasher</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0a0c1f; color: #c9d1d9; margin:0; padding:40px 20px; min-height:100vh; position:relative; overflow-y:auto; text-align:center; }
    #mesh-bg { position:fixed; top:0; left:0; right:0; bottom:0; z-index:-1; opacity:0.95; }
    .container { max-width:800px; margin:0 auto; position:relative; z-index:2; }
    h1 { font-size:3em; background:linear-gradient(90deg,#a855f7,#67e8f9); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
    p { color:#94a3b8; font-size:1.2em; max-width:600px; margin:20px auto; }
    button { padding:16px 36px; font-size:1.15em; font-weight:600; border:none; border-radius:9999px; cursor:pointer; margin:12px; transition:all 0.3s; }
    .btn-connect { background:linear-gradient(135deg,#22d3ee,#67e8f9); color:#0f172a; }
    .btn-send { background:linear-gradient(135deg,#22c55e,#86efac); color:#0f172a; }
    .status { background:#1e2937; padding:20px; border-radius:16px; margin:25px auto; max-width:700px; text-align:left; font-family:monospace; min-height:140px; white-space:pre-wrap; }
  </style>
</head>
<body>
  <div class="container">
    <h1>PLSChat Web Flasher</h1>
    <p>Flash firmware + apply your purchased licence</p>

    <button class="btn-connect" onclick="connectDevice()">🔌 Connect Device</button>
    <button onclick="refreshLicense()" style="background:#64748b;color:white;">🔄 Refresh / Detect Licence</button>

    <div id="statusBox" class="status">Click "Connect Device" above.<br>Hold the <strong>BOOT button</strong> on the Heltec while connecting.</div>

    <div id="licenseBox" style="display:none; background:#1e2937; padding:20px; border-radius:16px; margin:25px auto; max-width:700px;">
      <strong>✅ Licence Found</strong><br>
      <div id="licenseContent" style="margin-top:12px; background:#0f172a; padding:15px; border-radius:8px; font-family:monospace;"></div>
      <button class="btn-send" onclick="sendLicense()" style="margin-top:20px;">📤 Send Licence to Device</button>
    </div>
  </div>

  <canvas id="mesh-bg"></canvas>

  <script>
    let serialPort = null;
    let currentLicenseKey = "";

    // Mesh background
    const canvas = document.getElementById('mesh-bg');
    const ctx = canvas.getContext('2d');
    function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    let nodes = []; for(let i=0;i<72;i++) nodes.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.7,vy:(Math.random()-0.5)*0.7});
    function animate(){
      ctx.fillStyle = 'rgba(10,12,31,0.18)'; ctx.fillRect(0,0,canvas.width,canvas.height);
      requestAnimationFrame(animate);
    }
    animate();

    async function connectDevice() {
      const box = document.getElementById("statusBox");
      box.innerHTML = "🔄 Connecting...<br><strong>Hold BOOT button on Heltec now!</strong>";
      try {
        serialPort = await navigator.serial.requestPort();
        await serialPort.open({ baudRate: 115200 });
        box.innerHTML = "✅ Device Connected!<br>Ready to send licence.";
      } catch (err) {
        box.innerHTML = `❌ Could not connect.<br>Hold BOOT button and <button onclick="connectDevice()">Retry</button>`;
      }
    }

    async function refreshLicense() {
      const saved = localStorage.getItem('licenses');
      if (!saved) {
        document.getElementById("statusBox").innerHTML += "<br>No licence found in browser. Buy one first.";
        return;
      }
      const licenses = JSON.parse(saved);
      const macs = Object.keys(licenses);
      if (macs.length === 0) return;

      currentLicenseKey = licenses[macs[0]];
      const box = document.getElementById("licenseBox");
      document.getElementById("licenseContent").innerHTML = `
        <strong>MAC:</strong> ${macs[0]}<br>
        <strong>Key:</strong> ${currentLicenseKey}
      `;
      box.style.display = "block";
    }

    async function sendLicense() {
      if (!serialPort) {
        alert("Device must be plugged in and connected first.");
        return;
      }
      if (!currentLicenseKey) {
        alert("No licence found.");
        return;
      }
      const box = document.getElementById("statusBox");
      box.innerHTML += "\n→ Sending licence to device...";
      try {
        const writer = serialPort.writable.getWriter();
        await writer.write(new TextEncoder().encode(`LICENSE:${currentLicenseKey}\n`));
        writer.releaseLock();
        box.innerHTML += "\n✅ Licence sent successfully!";
      } catch (e) {
        box.innerHTML += "\n❌ Failed to send.";
      }
    }
  </script>
</body>
</html>
