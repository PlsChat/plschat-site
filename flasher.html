<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLSChat Web Flasher</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0c1f;
      color: #c9d1d9;
      margin:0;
      padding:40px 20px;
      min-height:100vh;
      position:relative;
      overflow-y:auto;
      text-align:center;
    }
    #mesh-bg { position:fixed; top:0; left:0; right:0; bottom:0; z-index:-1; opacity:0.95; }
    .container { max-width:800px; margin:0 auto; position:relative; z-index:2; padding-top:50px; }
    h1 { font-size:3em; background:linear-gradient(90deg,#a855f7,#67e8f9); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
    button {
      padding:16px 36px; font-size:1.15em; font-weight:600; border:none; border-radius:9999px;
      cursor:pointer; margin:12px; transition:all 0.3s; box-shadow:0 4px 15px rgba(0,0,0,0.3); color:white;
    }
    .btn-connect, .btn-flash, .btn-send { background: linear-gradient(135deg, #a855f7, #3b82f6); }
    .status {
      background:#1e2937; padding:20px; border-radius:16px; margin:25px auto;
      max-width:700px; text-align:left; font-family:monospace; min-height:140px; white-space:pre-wrap;
    }
    .success { color:#22c55e; font-weight:600; }
  </style>
</head>
<body>
  <div class="container">
    <button onclick="window.location.href='device-manager.html'" style="position:absolute; top:20px; left:30px; padding:10px 24px; background:#334155; color:white; border:none; border-radius:9999px;">
      ← Back to Device Manager
    </button>

    <h1>PLSChat Web Flasher</h1>
    <p>Flash firmware + apply your purchased licence</p>

    <button class="btn-connect" onclick="connectDevice()">🔌 Connect Device</button>
    <button class="btn-flash" onclick="flashFirmware()">⚡ Flash Device</button>

    <div id="statusBox" class="status">
      Click "Connect Device" above.<br>
      Hold the <strong>BOOT button</strong> on the Heltec while connecting.
    </div>

    <div id="licenseBox" style="display:none; background:#1e2937; padding:25px; border-radius:16px; margin:25px auto; max-width:700px;">
      <strong class="success">✅ Licence Found</strong><br><br>
      <div id="licenseContent" style="background:#0f172a; padding:15px; border-radius:8px; font-family:monospace; margin-bottom:20px;"></div>
      <button class="btn-send" onclick="sendLicense()">📤 Send Licence to Device</button>
    </div>

    <div id="flashInstaller" style="display:none; margin-top:40px;">
      <esp-web-install-button manifest="manifest.json"></esp-web-install-button>
      <p style="margin-top:20px;"><strong>Hold the BOOT button</strong> while clicking Connect in the installer.</p>
    </div>
  </div>

  <canvas id="mesh-bg"></canvas>

  <script>
    let serialPort = null;
    let currentLicenseKey = "";

    async function connectDevice() {
      const box = document.getElementById("statusBox");
      box.innerHTML = "🔄 Connecting to device...<br><strong>Hold the BOOT button now!</strong>";

      try {
        serialPort = await navigator.serial.requestPort();
        await serialPort.open({ baudRate: 115200 });
        box.innerHTML = `<span class="success">✅ Device Connected!</span><br>Looking for licence...`;
        await autoDetectLicense();
      } catch (err) {
        box.innerHTML = `❌ Connection failed.<br>Hold BOOT button and <button onclick="connectDevice()">Retry</button>`;
      }
    }

    async function autoDetectLicense() {
      if (!serialPort) return;

      const reader = serialPort.readable.getReader();
      let buffer = '';

      try {
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          buffer += new TextDecoder().decode(value);

          const macMatch = buffer.match(/MAC:([0-9A-F:]+)/i);
          if (macMatch) {
            const mac = macMatch[1];
            const saved = localStorage.getItem('licenses');
            if (saved) {
              const licenses = JSON.parse(saved);
              if (licenses[mac]) {
                currentLicenseKey = licenses[mac];
                document.getElementById("licenseContent").innerHTML = `
                  <strong>MAC:</strong> ${mac}<br>
                  <strong>Licence Key:</strong> ${currentLicenseKey}
                `;
                document.getElementById("licenseBox").style.display = "block";
                document.getElementById("statusBox").innerHTML += "<br>✅ Licence found for this device.";
                return;
              }
            }
            break;
          }
        }
      } finally {
        reader.releaseLock();
      }
    }

    async function sendLicense() {
      if (!serialPort || !currentLicenseKey) {
        alert("Device not connected or no licence found.");
        return;
      }

      const box = document.getElementById("statusBox");
      box.innerHTML += "\n→ Sending licence to device...";

      try {
        const writer = serialPort.writable.getWriter();
        const command = `LICENSE:${currentLicenseKey}\n`;
        await writer.write(new TextEncoder().encode(command));
        writer.releaseLock();

        box.innerHTML += "\n✅ Licence command sent!";
        box.innerHTML += "\nWaiting for device response...";

        // Read response with timeout, accumulating chunks
        const reader = serialPort.readable.getReader();
        let response = '';
        let timedOut = false;
        const timeout = setTimeout(() => { timedOut = true; }, 5000);

        try {
          while (!timedOut) {
            const readPromise = reader.read();
            const timeoutPromise = new Promise(resolve => setTimeout(() => resolve({ done: true, value: null }), 5000));
            const result = await Promise.race([readPromise, timeoutPromise]);

            if (result.done || result.value === null) break;

            response += new TextDecoder().decode(result.value);
            box.innerHTML += `\nDevice: ${response.trim()}`;

            if (response.includes("LICENCE_OK") || response.includes("LICENSE_OK") || response.includes("OK")) {
              box.innerHTML += "\n🎉 Device accepted the licence!";
              clearTimeout(timeout);
              break;
            }
            if (response.includes("FAIL") || response.includes("ERROR") || response.includes("INVALID")) {
              box.innerHTML += "\n❌ Device rejected the licence.";
              clearTimeout(timeout);
              break;
            }
          }

          if (timedOut && response === '') {
            box.innerHTML += "\n⚠️ No response from device within 5 seconds.";
          }
        } finally {
          reader.releaseLock();
        }

      } catch (e) {
        box.innerHTML += `\n❌ Failed to send licence: ${e.message}`;
      }
    }

    function flashFirmware() {
      document.getElementById("flashInstaller").style.display = "block";
    }
  </script>
</body>
</html>
